<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#3C3D48">
<title>CLEAR</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --lime: #CAFF4C;
    --gray: #C9C9C9;
    --gray-light: #F7F7F5;
    --terracotta: #D46E58;
    --teal: #72C4AB;
    --lavender: #BFB0CC;
    --charcoal: #3C3D48;
    --black: #000000;
    --cobalt: #1A3A8C;
    --danger: #CC2200;
    --warn: #C8A400;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--charcoal); color: var(--cobalt); -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root {
    max-width: 480px;
    margin: 0 auto;
    /* Black so overscroll/short-content bleed reads as an extension of the
       black © CLEAR footer strip — never the off-white content card. */
    background: var(--black);
    min-height: 100vh;
    /* Hard cap against a runaway descendant (chip row, wide input) blowing
       the app column wider than the viewport on iOS Safari. */
    overflow-x: hidden;
    min-width: 0;
    width: 100%;
  }
  /* Defensive: nothing anywhere may cause the window to scroll horizontally. */
  html, body { background: var(--black); overflow-x: hidden; max-width: 100%; }
  button {
    font-family: inherit; text-transform: inherit; letter-spacing: inherit;
    color: var(--cobalt); background: none; border: none; cursor: pointer;
    padding: 0;
  }
  input, textarea, select {
    font-family: inherit; text-transform: inherit; letter-spacing: inherit;
    color: var(--cobalt); background: transparent; border: none; outline: none;
    width: 100%;
  }
  input::placeholder, textarea::placeholder { color: var(--cobalt); opacity: 0.45; }

  .screen { position: relative; padding-bottom: 128px; max-width: 100%; overflow-x: hidden; }
  .section { padding: 32px 24px; max-width: 100%; overflow-x: hidden; }
  .section.lime { background: var(--lime); }
  .section.gray { background: var(--gray); }
  .section.off-white { background: var(--gray-light); }
  .section.terracotta { background: var(--terracotta); }
  .section.teal { background: var(--teal); }
  .section.lavender { background: var(--lavender); }
  .section.charcoal { background: var(--charcoal); }

  .sub-label { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; }
  .hero { font-size: 64px; font-weight: 500; line-height: 1.05; letter-spacing: 0.01em; }
  .hero.danger { color: var(--danger); }
  .section-label { font-size: 40px; font-weight: 500; line-height: 1.05; }
  .section-label.med { font-size: 32px; }
  .body { font-size: 18px; font-weight: 400; }
  .meta { font-size: 13px; font-weight: 500; letter-spacing: 0.12em; opacity: 0.85; }

  .stack-8 > * + * { margin-top: 8px; }
  .stack-16 > * + * { margin-top: 16px; }
  .stack-24 > * + * { margin-top: 24px; }
  .stack-32 > * + * { margin-top: 32px; }

  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .row-right { display: flex; align-items: center; gap: 12px; }

  .gear {
    position: absolute; top: 16px; right: 20px;
    background: transparent; z-index: 5; min-width: 48px; min-height: 48px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .gear svg { display: block; }
  .settings-title-icon { display: inline-flex; align-items: center; vertical-align: -6px; margin-right: 8px; }
  .settings-header {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .settings-header .section-label { line-height: 1; }
  .settings-back {
    font-size: 14px; font-weight: 600; letter-spacing: 0.16em;
    min-height: 48px; padding: 0 4px; white-space: nowrap;
    color: var(--cobalt); background: transparent;
  }
  .back {
    position: absolute; top: 16px; left: 20px;
    font-size: 18px; font-weight: 600; letter-spacing: 0.12em;
    background: transparent; z-index: 5; min-width: 48px; min-height: 48px;
    text-align: left;
  }

  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--charcoal); display: flex; justify-content: center; z-index: 20;
  }
  .tabbar-inner { max-width: 480px; width: 100%; display: flex; }
  .tab {
    flex: 1; padding: 22px 0; text-align: center;
    color: #FFFFFF; font-size: 16px; font-weight: 600; letter-spacing: 0.16em;
    min-height: 64px;
  }
  .tab.active { color: var(--lime); }

  .footer {
    background: var(--black); height: 48px;
    display: flex; align-items: center; justify-content: center;
    color: var(--cobalt); font-size: 20px; font-weight: 500; letter-spacing: 0.16em;
  }
  .footer-brand { color: var(--cobalt); font-size: 20px; }

  .cta {
    display: block; width: 100%; height: 56px;
    background: var(--cobalt); color: var(--lime);
    font-size: 16px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; text-align: center;
  }
  .cta.big { height: 72px; font-size: 20px; }
  .cta.ghost { background: transparent; color: var(--cobalt); border: 2px solid var(--cobalt); }

  .underline {
    display: block; width: 100%;
    border-bottom: 2px solid var(--cobalt);
    padding: 12px 0; font-size: 18px; background: transparent;
    text-align: left;
  }
  .underline.big { font-size: 32px; font-weight: 500; }
  .underline.mid { font-size: 22px; font-weight: 500; }

  .chips {
    display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 8px; margin: 0 -4px;
    /* Explicit box sizing so iOS Safari doesn't let the flex container grow to
       fit its intrinsic content-width — that's what caused the txn editor to
       blow past the app column on real phones. */
    width: 100%; max-width: 100%; min-width: 0;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
  }
  .chips::-webkit-scrollbar { display: none; }
  .chips { -ms-overflow-style: none; scrollbar-width: none; }
  .chip {
    padding: 14px 16px; background: var(--gray-light); color: var(--cobalt);
    font-size: 12px; font-weight: 600; letter-spacing: 0.14em;
    white-space: nowrap; min-height: 48px;
    display: inline-flex; align-items: center;
    flex-shrink: 0;
  }
  .chip.active { background: var(--cobalt); color: var(--lime); }
  .chip.debt-chip { border-left: 4px solid var(--terracotta); }
  .chip.bill-chip { border-left: 4px solid var(--lavender); }

  .toggle-row { display: flex; gap: 24px; margin-top: 12px; flex-wrap: wrap; }
  .toggle {
    padding: 12px 4px 8px; color: var(--cobalt);
    font-size: 14px; font-weight: 600; letter-spacing: 0.14em;
    border-bottom: 3px solid transparent; min-height: 48px;
  }
  .toggle.active { border-bottom-color: var(--lime); }

  .txn-row {
    display: grid;
    grid-template-columns: 44px 1fr 92px 90px;
    align-items: center; height: 56px;
    border-bottom: 1px solid rgba(26, 58, 140, 0.2);
    padding: 0 4px; gap: 8px;
    font-size: 14px; font-weight: 500; letter-spacing: 0.06em;
  }
  .txn-date { font-size: 12px; letter-spacing: 0.12em; }
  .txn-note { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .txn-cat { font-size: 10px; letter-spacing: 0.12em; opacity: 0.75; text-align: right; }
  .txn-amt { text-align: right; font-weight: 600; font-size: 15px; }
  .txn-tag { font-size: 10px; letter-spacing: 0.14em; opacity: 0.8; display: block; margin-top: 2px; }
  .txn-tag.needs { color: var(--danger); opacity: 1; font-weight: 600; }
  .txn-row.needs-category { border-left: 3px solid var(--danger); padding-left: 4px; }
  .txn-actions { display: flex; gap: 16px; padding: 8px 4px 16px; border-bottom: 1px solid rgba(26,58,140,0.2); }
  .txn-actions button { font-size: 12px; font-weight: 600; letter-spacing: 0.14em; padding: 8px 4px; min-height: 44px; }
  .txn-actions .del-btn { color: var(--danger); }
  .txn-confirm { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid rgba(26,58,140,0.2); font-size: 12px; letter-spacing: 0.14em; }
  .txn-confirm span { flex: 1; }
  .txn-confirm button { font-size: 12px; font-weight: 600; letter-spacing: 0.14em; padding: 8px 12px; min-height: 44px; border: 2px solid var(--cobalt); }
  .txn-confirm .yes { background: var(--cobalt); color: var(--lime); }
  .txn-row.expanded { background: var(--gray-light); }

  .progress { height: 4px; background: rgba(26, 58, 140, 0.2); width: 100%; margin: 8px 0; }
  .progress > span { display: block; height: 100%; background: var(--cobalt); }
  .progress.warn > span { background: var(--warn); }
  .progress.danger > span { background: var(--danger); }
  .text-danger { color: var(--danger); }
  .text-warn { color: var(--warn); }

  .cat-row + .cat-row { margin-top: 16px; }
  .cat-line { display: flex; justify-content: space-between; align-items: baseline; font-size: 16px; font-weight: 600; letter-spacing: 0.06em; gap: 8px; }
  .cat-remaining { font-size: 12px; letter-spacing: 0.12em; opacity: 0.85; margin-top: 4px; }

  .setup {
    background: var(--lime); min-height: 100vh;
    padding: 56px 24px 32px; display: flex; flex-direction: column;
    max-width: 480px; margin: 0 auto;
  }
  .setup .setup-inner { display: flex; flex-direction: column; gap: 24px; flex: 1; }
  .setup h1 { font-size: 32px; font-weight: 500; line-height: 1.1; letter-spacing: 0.04em; }
  .setup h2 { font-size: 40px; font-weight: 500; line-height: 1.05; }
  .setup .brand { font-size: 48px; font-weight: 500; letter-spacing: 0.08em; }
  .code-display {
    font-size: 64px; font-weight: 500; letter-spacing: 0.12em;
    text-align: center; padding: 24px 0;
  }
  .link {
    color: var(--cobalt); font-size: 14px; font-weight: 600; letter-spacing: 0.14em;
    text-decoration: underline; background: transparent; text-align: left;
    min-height: 48px; padding: 12px 0;
  }
  .link.center { text-align: center; }

  .debt-card { padding: 24px; border-bottom: 1px solid rgba(26, 58, 140, 0.2); }
  .debt-card:last-child { border-bottom: none; }
  .debt-header {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em; margin-bottom: 8px;
  }
  .debt-label { font-size: 24px; font-weight: 500; margin-bottom: 4px; letter-spacing: 0.04em; }
  .debt-balance { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .debt-meta { font-size: 11px; letter-spacing: 0.14em; opacity: 0.85; margin-top: 4px; }
  .debt-meta + .debt-meta { margin-top: 2px; }
  .link-tag { font-size: 11px; letter-spacing: 0.14em; opacity: 0.85; margin-top: 4px; }

  .settings-group {
    background: var(--gray-light); padding: 24px; margin-top: 16px;
    max-width: 100%; overflow-x: hidden;
  }
  .settings-group h3 {
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em; margin-bottom: 16px;
  }
  .list-item {
    display: grid; grid-template-columns: minmax(0, 1fr) auto auto;
    align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid rgba(26,58,140,0.2);
    font-size: 14px; letter-spacing: 0.06em;
    max-width: 100%;
  }
  .list-item > * { min-width: 0; }
  .list-item > span:first-child { overflow-wrap: anywhere; }
  .list-item:last-child { border-bottom: none; }
  .list-item .del { font-size: 18px; padding: 0 4px; min-height: 44px; min-width: 44px; }
  .list-item.locked { opacity: 0.9; }
  .locked-tag { font-size: 10px; letter-spacing: 0.14em; opacity: 0.7; }

  .inline-form {
    display: grid; grid-template-columns: minmax(0, 1fr); gap: 8px;
    padding: 12px 0; border-top: 2px solid var(--cobalt); margin-top: 8px;
    max-width: 100%;
  }
  /* Grid + flex items default to min-width: auto which forces a child chip
     row's total width onto the parent — breaking 375px viewports. Cascade
     min-width: 0 through every level of the inline form so overflow-x on
     the chip rows below actually engages. */
  .inline-form, .inline-form > *, .inline-form .field, .inline-form .field > * { min-width: 0; max-width: 100%; }
  .inline-form .field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .inline-form label { font-size: 11px; letter-spacing: 0.16em; font-weight: 600; opacity: 0.85; }
  .inline-form input { border-bottom: 1px solid var(--cobalt); padding: 6px 0; font-size: 16px; width: 100%; }
  .inline-form .row-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .inline-form .row-actions button { flex: 1 1 140px; height: 48px; font-size: 13px; letter-spacing: 0.14em; font-weight: 600; min-width: 0; }
  .inline-form .chips { max-width: 100%; overflow-x: auto; }
  .inline-form .toggle-row { flex-wrap: wrap; }

  .overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--gray); overflow-y: auto; z-index: 100;
  }
  .overlay-inner { max-width: 480px; margin: 0 auto; padding: 48px 24px 32px; overflow-x: hidden; }
  .overlay .rollover-row {
    background: var(--gray-light); padding: 20px; margin-bottom: 12px;
  }
  .overlay .rollover-row h4 { font-size: 16px; font-weight: 600; letter-spacing: 0.08em; }
  .overlay .rollover-row .amt { font-size: 24px; font-weight: 500; margin-top: 4px; }
  .overlay .choice-row { display: flex; gap: 8px; margin-top: 12px; }
  .overlay .choice-row button {
    flex: 1; height: 56px; font-size: 13px; font-weight: 600; letter-spacing: 0.14em;
    color: var(--cobalt); background: transparent; border: 2px solid var(--cobalt);
  }
  .overlay .choice-row button.active { background: var(--cobalt); color: var(--lime); }

  /* Import UI */
  .import-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; margin-bottom: 16px; }
  .overlay-title { font-size: 32px; font-weight: 500; letter-spacing: 0.04em; line-height: 1.1; }
  .overlay-sub { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; margin-top: 8px; opacity: 0.85; }
  textarea.paste-area {
    width: 100%; min-height: 320px;
    background: var(--gray-light); color: var(--cobalt);
    border: none; outline: none; padding: 16px;
    font-family: inherit; font-size: 14px; text-transform: uppercase;
    letter-spacing: 0.04em; line-height: 1.4;
    resize: vertical;
  }
  .csv-preview { background: var(--gray-light); padding: 12px; overflow-x: auto; margin-top: 16px; }
  .csv-preview table { border-collapse: collapse; font-size: 12px; letter-spacing: 0.06em; min-width: 100%; }
  .csv-preview th, .csv-preview td { padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(26,58,140,0.2); white-space: nowrap; vertical-align: top; }
  .csv-preview th { font-weight: 600; letter-spacing: 0.12em; }
  .csv-col-btn {
    display: block; width: 100%; padding: 6px 8px; margin: 2px 0;
    font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
    background: transparent; color: var(--cobalt); border: 1px solid var(--cobalt);
    min-height: 32px;
  }
  .csv-col-btn.picked { background: var(--cobalt); color: var(--lime); }
  .preview-txn {
    background: var(--gray-light); padding: 12px 16px; margin-top: 8px;
    display: grid; grid-template-columns: 60px 1fr auto; gap: 8px;
    font-size: 13px; letter-spacing: 0.06em;
  }
  .preview-txn .d { font-size: 11px; letter-spacing: 0.14em; }
  .preview-txn .a { text-align: right; font-weight: 600; }
  .review-row { padding: 16px 4px; border-bottom: 1px solid rgba(26,58,140,0.2); max-width: 100%; overflow: hidden; }
  .review-row.skipped { opacity: 0.55; }
  .review-row > * { min-width: 0; max-width: 100%; }
  .review-row-line { display: grid; grid-template-columns: 48px minmax(0, 1fr) auto; gap: 8px; align-items: baseline; font-size: 14px; font-weight: 500; letter-spacing: 0.06em; }
  .review-row-line > * { min-width: 0; }
  .review-row .d { font-size: 12px; letter-spacing: 0.12em; }
  .review-row .desc { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .review-row .a { text-align: right; font-weight: 600; font-size: 15px; }
  .review-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; align-items: center; }
  .review-controls .toggle { min-height: 40px; padding: 8px 4px; font-size: 12px; }
  .review-controls .skip-btn { color: var(--danger); font-size: 12px; font-weight: 600; letter-spacing: 0.14em; min-height: 40px; padding: 8px 4px; }
  .review-controls .unskip-btn { color: var(--cobalt); font-size: 12px; font-weight: 600; letter-spacing: 0.14em; min-height: 40px; padding: 8px 4px; }
  .review-skip-reason { font-size: 11px; letter-spacing: 0.14em; margin-top: 6px; opacity: 0.85; }
  .review-cat-chips { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; margin-top: 8px; -ms-overflow-style: none; scrollbar-width: none; }
  .review-cat-chips::-webkit-scrollbar { display: none; }
  .review-cat-chip {
    padding: 8px 12px; font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
    background: var(--gray-light); color: var(--cobalt);
    white-space: nowrap; flex-shrink: 0; min-height: 40px;
    display: inline-flex; align-items: center;
  }
  .review-cat-chip.active { background: var(--cobalt); color: var(--lime); }
  .review-cat-chip .auto { margin-left: 6px; opacity: 0.7; font-size: 9px; }
  .review-cat-label { font-size: 11px; letter-spacing: 0.14em; font-weight: 600; margin-top: 8px; opacity: 0.7; }
  .review-cat-label.needs { color: var(--danger); opacity: 1; }
  .review-row.needs-category { border-left: 3px solid var(--danger); padding-left: 8px; }

  .loading {
    min-height: 100vh; background: var(--lime);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; gap: 24px;
  }
  .loading .brand { font-size: 64px; font-weight: 500; letter-spacing: 0.08em; }
  .loading .msg { font-size: 14px; font-weight: 600; letter-spacing: 0.16em; }

  .divider-line { height: 1px; background: rgba(26,58,140,0.2); margin: 12px 0; }

  .copy-btn {
    font-size: 12px; font-weight: 600; letter-spacing: 0.14em;
    padding: 8px 12px; border: 2px solid var(--cobalt); min-height: 44px;
  }

  .field-inline {
    display: grid; grid-template-columns: 1fr 90px 60px auto;
    align-items: center; gap: 8px;
    padding: 10px 0; border-bottom: 1px solid rgba(26,58,140,0.2);
    font-size: 13px; letter-spacing: 0.08em;

  .num-input { text-align: right; }
</style>

<div id="root"></div>
<script>
"use strict";

// Build version. Surfaced in Settings > HOUSEHOLD so a stale cache is diagnosable.
// Bump every round.
const APP_VERSION = "V9";

/* ============================================================
   FIREBASE INIT
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCDpGVE4RUazjzwPasC73VOcUtRnvMZwXA",
  authDomain: "budget-app-dfc07.firebaseapp.com",
  projectId: "budget-app-dfc07",
  storageBucket: "budget-app-dfc07.firebasestorage.app",
  messagingSenderId: "100349315850",
  appId: "1:100349315850:web:a8406745705a9c682308f3"
};

let db = null;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
} catch (e) {
  console.warn("firebase init failed", e);
}

/* ============================================================
   UTIL
   ============================================================ */
const Util = (() => {
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
      { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]
    ));
  }
  function fmtMoney(n, decimals) {
    decimals = decimals || 0;
    if (!isFinite(n)) n = 0;
    const neg = n < 0;
    const abs = Math.abs(n);
    const s = abs.toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    return (neg ? "-$" : "$") + s;
  }
  function fmtMonthShort(ym) {
    if (!ym) return "";
    const [y, m] = ym.split("-").map(Number);
    const names = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    return `${names[m-1]} ${y}`;
  }
  function fmtMonthLong(ym) {
    if (!ym) return "";
    const [y, m] = ym.split("-").map(Number);
    const names = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
    return `${names[m-1]} ${y}`;
  }
  function fmtDateShort(iso) {
    if (!iso) return "";
    const d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return iso;
    const names = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    return `${names[d.getMonth()]} ${d.getDate()}`;
  }
  function todayISO() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }
  function currentMonthYM() {
    return todayISO().slice(0,7);
  }
  function uuid() {
    return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 9);
  }
  return { esc, fmtMoney, fmtMonthShort, fmtMonthLong, fmtDateShort, todayISO, currentMonthYM, uuid };
})();

/* ============================================================
   DATA SERVICE
   Firestore + localStorage household code
   ============================================================ */
const DataService = (() => {
  const HOUSEHOLD_KEY = "clear_household_id";
  let unsub = null;
  let currentDoc = null;
  let currentId = null;
  const dataListeners = [];
  const errorListeners = [];

  function generateCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let s = "";
    for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
    return s;
  }
  function getHouseholdId() {
    try { return localStorage.getItem(HOUSEHOLD_KEY); } catch (e) { return null; }
  }
  function setHouseholdIdLocal(id) {
    try { localStorage.setItem(HOUSEHOLD_KEY, id); } catch (e) {}
    currentId = id;
  }
  function clearHouseholdId() {
    try { localStorage.removeItem(HOUSEHOLD_KEY); } catch (e) {}
    if (unsub) { try { unsub(); } catch (e) {} unsub = null; }
    currentDoc = null;
    currentId = null;
  }
  function onData(fn) { dataListeners.push(fn); }
  function onError(fn) { errorListeners.push(fn); }
  function emit(doc) { dataListeners.forEach(f => { try { f(doc); } catch (e) { console.warn(e); } }); }
  function emitErr(e) { errorListeners.forEach(f => { try { f(e); } catch (er) { console.warn(er); } }); }

  function subscribe(id) {
    if (!db) { emitErr(new Error("firestore unavailable")); return; }
    if (unsub) { try { unsub(); } catch (e) {} }
    currentId = id;
    try {
      unsub = db.collection("households").doc(id).onSnapshot(
        snap => {
          currentDoc = snap && snap.exists ? snap.data() : null;
          emit(currentDoc);
        },
        err => {
          console.warn("snapshot error", err);
          emitErr(err);
        }
      );
    } catch (e) {
      console.warn("subscribe threw", e);
      emitErr(e);
    }
  }

  function get() { return currentDoc; }
  function getId() { return currentId; }

  function set(data) {
    if (!db || !currentId) return Promise.reject(new Error("no household"));
    return db.collection("households").doc(currentId).set(data);
  }
  function update(patch) {
    if (!db || !currentId) return Promise.reject(new Error("no household"));
    return db.collection("households").doc(currentId).update(patch);
  }
  async function checkExists(id) {
    if (!db) throw new Error("firestore unavailable");
    const snap = await db.collection("households").doc(id).get();
    return snap.exists;
  }

  return {
    generateCode, getHouseholdId, setHouseholdIdLocal, clearHouseholdId,
    subscribe, onData, onError, get, getId, set, update, checkExists
  };
})();

/* ============================================================
   BUDGET ENGINE — pure functions, no DOM
   ============================================================ */
const BudgetEngine = (() => {
  const num = v => (isFinite(Number(v)) ? Number(v) : 0);

  function totalIncome(s) {
    return (s.income || []).reduce((a, i) => a + num(i.amount), 0);
  }
  function tithePercent(s) {
    return num(s.settings && s.settings.tithePercent != null ? s.settings.tithePercent : 10);
  }
  function tithe(s) {
    return totalIncome(s) * tithePercent(s) / 100;
  }
  function billsSubtotal(s) {
    return (s.bills || []).reduce((a, b) => a + num(b.amount), 0);
  }
  // Sum of stored bills only. Tithe is a display-only locked line and is
  // subtracted separately in safeToSpend / extraForDebt as the FIRST allocation from income.
  function totalBills(s) {
    return billsSubtotal(s);
  }
  function totalDebtMins(s) {
    return (s.debts || []).reduce((a, d) => a + num(d.minimumPayment), 0);
  }
  function totalUnpaidCredit(s) {
    const m = s.currentMonth;
    return (s.transactions || [])
      .filter(t => t.paymentType === "credit" && t.month === m)
      .reduce((a, t) => a + num(t.amount), 0);
  }
  function safeToSpend(s) {
    return totalIncome(s) - tithe(s) - totalBills(s) - totalDebtMins(s) - totalUnpaidCredit(s);
  }
  function spendingBudgetedTotal(s) {
    return (s.spendingCategories || []).reduce((a, c) => a + num(c.budgeted), 0);
  }
  function totalBudgeted(s) {
    return billsSubtotal(s) + tithe(s) + totalDebtMins(s) + spendingBudgetedTotal(s);
  }
  function extraForDebt(s) {
    return totalIncome(s) - tithe(s) - totalBills(s) - totalDebtMins(s) - spendingBudgetedTotal(s);
  }
  function categorySpent(s, id) {
    const m = s.currentMonth;
    return (s.transactions || [])
      .filter(t => t.categoryId === id && t.month === m)
      .reduce((a, t) => a + num(t.amount), 0);
  }
  function rolloverAmount(s, id) {
    return num(s.monthlyRollover && s.monthlyRollover[s.currentMonth] && s.monthlyRollover[s.currentMonth][id]);
  }
  function categoryRemaining(s, cat) {
    return num(cat.budgeted) + rolloverAmount(s, cat.id) - categorySpent(s, cat.id);
  }
  function personSpent(s, person) {
    const m = s.currentMonth;
    return (s.transactions || [])
      .filter(t => t.month === m && t.person === person)
      .reduce((a, t) => a + num(t.amount), 0);
  }
  function totalDebt(s) {
    return (s.debts || []).reduce((a, d) => a + num(d.balance), 0);
  }
  // Debt payoff order:
  //   avalanche = interest rate DESC, tie-break smaller balance first
  //   snowball  = balance ASC,        tie-break higher rate first
  function debtOrder(debts, strategy) {
    const strat = strategy === "snowball" ? "snowball" : "avalanche";
    return (debts || []).slice().sort((a, b) => {
      if (strat === "avalanche") {
        const r = num(b.interestRate) - num(a.interestRate);
        if (r !== 0) return r;
        return num(a.balance) - num(b.balance);
      }
      const bal = num(a.balance) - num(b.balance);
      if (bal !== 0) return bal;
      return num(b.interestRate) - num(a.interestRate);
    });
  }
  function debtStrategy(s) {
    return (s && s.settings && s.settings.debtStrategy === "snowball") ? "snowball" : "avalanche";
  }
  function targetDebt(s) {
    const active = debtOrder((s.debts || []).filter(d => num(d.balance) > 0), debtStrategy(s));
    return active[0] || null;
  }
  // Actually paid on credit that has been "covered" (spent from cash budget). We use a simple model:
  // cash to cover = safeToSpend + totalUnpaidCredit (i.e. what would remain if credit was paid off).
  function unpaidCredit(s) { return totalUnpaidCredit(s); }
  function cashToCover(s) {
    // The safeToSpend formula already deducts unpaid credit. Total cash available to pay off credit
    // this month = safeToSpend + unpaidCredit. If <0, we can't cover the credit.
    return safeToSpend(s) + totalUnpaidCredit(s);
  }

  return {
    num,
    totalIncome, tithePercent, tithe, billsSubtotal, totalBills, totalDebtMins,
    totalUnpaidCredit, safeToSpend, spendingBudgetedTotal, totalBudgeted, extraForDebt,
    categorySpent, rolloverAmount, categoryRemaining, personSpent,
    totalDebt, targetDebt, debtOrder, debtStrategy, unpaidCredit, cashToCover
  };
})();

/* ============================================================
   DEBT ENGINE — pure snowball simulation
   ============================================================ */
const DebtEngine = (() => {
  const monthNames = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

  // strategy: "avalanche" (default) or "snowball". Sort order controls both which debt
  // receives the extra payment AND the cascade order when a debt is paid off.
  function simulate(debtsInput, extraPerMonth, startMonth, strategy) {
    const empty = { payoffByDebt: {}, debtFreeDate: null, months: 0, order: [] };
    if (!debtsInput || !debtsInput.length) return empty;
    const strat = strategy === "snowball" ? "snowball" : "avalanche";

    const sim = debtsInput.map(d => ({
      id: d.id,
      label: d.label,
      balance: Number(d.balance) || 0,
      min: Number(d.minimumPayment) || 0,
      rate: Number(d.interestRate) || 0
    })).filter(d => d.balance > 0)
      .sort((a, b) => {
        if (strat === "avalanche") return (b.rate - a.rate) || (a.balance - b.balance);
        return (a.balance - b.balance) || (b.rate - a.rate);
      });

    if (!sim.length) return empty;

    const order = sim.map(d => d.id);
    const payoff = {};
    let [year, month] = (startMonth || Util.currentMonthYM()).split("-").map(Number);
    let cascadedMin = 0;
    let iter = 0;
    const MAX = 720; // 60 years cap safety

    while (sim.some(d => d.balance > 0) && iter < MAX) {
      // 1. Minimum payments to all still-active debts
      for (const d of sim) {
        if (d.balance <= 0) continue;
        d.balance -= d.min;
        if (d.balance < 0) d.balance = 0;
      }
      // 2. Apply interest to all still-active debts
      for (const d of sim) {
        if (d.balance <= 0) continue;
        d.balance += d.balance * (d.rate / 12 / 100);
      }
      // 3. Send extra + cascaded to smallest still-active, cascade overflow
      let extra = (Number(extraPerMonth) || 0) + cascadedMin;
      for (const d of sim) {
        if (d.balance <= 0) continue;
        if (extra <= 0) break;
        const applied = Math.min(extra, d.balance);
        d.balance -= applied;
        extra -= applied;
      }
      // 4. Record any new payoffs, cascade their minimums into future extras
      for (const d of sim) {
        if (d.balance <= 0 && !payoff[d.id]) {
          payoff[d.id] = `${monthNames[month - 1]} ${year}`;
          cascadedMin += d.min;
        }
      }
      iter++;
      if (sim.every(d => d.balance <= 0)) break;
      // Advance month
      month++;
      if (month > 12) { month = 1; year++; }
    }

    // Debt-free date is the latest payoff month
    let latest = null;
    let latestKey = -1;
    for (const id in payoff) {
      const [mo, yr] = payoff[id].split(" ");
      const k = Number(yr) * 12 + monthNames.indexOf(mo);
      if (k > latestKey) { latestKey = k; latest = payoff[id]; }
    }
    return { payoffByDebt: payoff, debtFreeDate: latest, months: iter, order };
  }

  return { simulate };
})();

/* ============================================================
   IMPORT ENGINE — pure functions, no DOM
   CSV + line-based text parsing, fingerprints, merchant normalization,
   two-tier duplicate detection. Shared by both input paths.
   ============================================================ */
const ImportEngine = (() => {
  const MON = { JAN:1, FEB:2, MAR:3, APR:4, MAY:5, JUN:6, JUL:7, AUG:8, SEP:9, OCT:10, NOV:11, DEC:12 };
  const pad2 = n => String(n).padStart(2, "0");

  // Resolve a M/D or MON DD (no year) date. Assume current year unless the
  // resulting date lies in the future — then roll back to the prior year.
  function resolveNoYear(month, day, refYear, today) {
    today = today || new Date();
    const y = refYear || today.getFullYear();
    let cand = new Date(y, month - 1, day);
    // 14-day grace window. Bank statements pasted today commonly include
    // postings dated a few days ahead (weekend clearing, pending). Only roll
    // back to the prior year when the candidate is more than 14 days in the
    // future — otherwise the row silently vanished into 2025-07 etc.
    const cutoff = today.getTime() + 14 * 86400000;
    if (cand.getTime() > cutoff) cand = new Date(y - 1, month - 1, day);
    return `${cand.getFullYear()}-${pad2(month)}-${pad2(day)}`;
  }

  // Parse a single date string. Returns ISO YYYY-MM-DD or null.
  function parseDate(str, refYear, today) {
    if (!str) return null;
    const s = String(str).trim().toUpperCase();
    let m;
    if ((m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/))) return `${m[1]}-${pad2(m[2])}-${pad2(m[3])}`;
    if ((m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/))) return `${m[3]}-${pad2(m[1])}-${pad2(m[2])}`;
    if ((m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/))) return `20${m[3]}-${pad2(m[1])}-${pad2(m[2])}`;
    if ((m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/))) return `${m[3]}-${pad2(m[1])}-${pad2(m[2])}`;
    if ((m = s.match(/^(\d{1,2})\/(\d{1,2})$/))) return resolveNoYear(Number(m[1]), Number(m[2]), refYear, today);
    if ((m = s.match(/^([A-Z]{3})\.?\s+(\d{1,2})(?:,?\s+(\d{4}))?$/)) && MON[m[1]]) {
      if (m[3]) return `${m[3]}-${pad2(MON[m[1]])}-${pad2(m[2])}`;
      return resolveNoYear(MON[m[1]], Number(m[2]), refYear, today);
    }
    if ((m = s.match(/^(\d{1,2})\s+([A-Z]{3})\.?\s+(\d{4})$/)) && MON[m[2]]) {
      return `${m[3]}-${pad2(MON[m[2]])}-${pad2(m[1])}`;
    }
    return null;
  }

  // Find the first date token in a line. Returns { iso, raw, index } or null.
  function findDate(line, refYear, today) {
    const patterns = [
      /(\d{4}-\d{1,2}-\d{1,2})/,
      /(\d{1,2}\/\d{1,2}\/\d{4})/,
      /(\d{1,2}\/\d{1,2}\/\d{2})/,
      /(\d{1,2}-\d{1,2}-\d{4})/,
      /(\d{1,2}\/\d{1,2})(?!\d)/,
      /([A-Z]{3})\.?\s+(\d{1,2})(?:,?\s+(\d{4}))?/i,
      /(\d{1,2})\s+([A-Z]{3})\.?\s+(\d{4})/i
    ];
    for (const p of patterns) {
      const m = line.match(p);
      if (!m) continue;
      const raw = m[0];
      const iso = parseDate(raw, refYear, today);
      if (iso) return { iso, raw, index: m.index };
    }
    return null;
  }

  // Find currency-like amount tokens. Returns [{ value, index, len, raw }].
  // Rules (tightened after the T-1044 defect):
  //   (a) A leading "-" counts as a negative sign ONLY when preceded by start-of-line,
  //       whitespace, or "$". A hyphen inside a token like "T-1044" is NOT a sign.
  //   (b) An amount token MUST carry a currency signal: a decimal point, a comma
  //       thousands-group, a leading "$", or accounting parens. Bare integers —
  //       signed or unsigned — never qualify in paste text (store ids like "1044"
  //       and reference codes look like bare integers).
  //   CSV cells that hold a lone signed integer keep their parseFloat fallback in
  //   goToReviewFromCsv, where a cell is unambiguously an amount.
  function findAmounts(line) {
    const results = [];
    const re = /(\()?(-)?(\$)?(\d{1,3}(?:,\d{3})+|\d+)(?:\.(\d{2}))?(\))?/g;
    let m;
    while ((m = re.exec(line)) !== null) {
      const openParen = m[1], minus = m[2], dollar = m[3];
      const intPart = m[4] || "", decPart = m[5], closeParen = m[6];
      const startIdx = m.index;
      const hasDec = !!decPart;
      const hasComma = /,/.test(intPart);
      const hasDollar = !!dollar;
      const hasParen = !!openParen && !!closeParen;
      // Boundary check for the leading minus.
      if (minus) {
        const before = startIdx > 0 ? line[startIdx - 1] : "";
        const validBoundary = (startIdx === 0) || /\s/.test(before) || before === "$";
        if (!validBoundary) {
          // The "-" is a hyphen inside a word (e.g. "T-1044"). Skip only the minus
          // and let the regex re-scan from the digit position — that way a genuine
          // "$52.40" tucked inside "REF-$52.40" is still picked up.
          re.lastIndex = startIdx + 1;
          continue;
        }
      }
      // Currency signal is mandatory. Note: minus alone is NOT a signal.
      if (!hasDec && !hasComma && !hasDollar && !hasParen) continue;
      let v = parseFloat(intPart.replace(/,/g, "") + (decPart ? "." + decPart : ""));
      if (!isFinite(v)) continue;
      if (hasParen || minus) v = -Math.abs(v);
      const raw = m[0];
      results.push({ value: v, index: startIdx, len: raw.length, raw });
    }
    return results;
  }

  // CSV parser: handles quoted fields, escaped quotes, CRLF/LF, BOM.
  function csvParse(text) {
    if (text == null) return { headers: [], rows: [] };
    const t = String(text).replace(/^﻿/, "");
    const rows = [];
    let cur = "", row = [], inQuotes = false;
    for (let i = 0; i < t.length; i++) {
      const c = t[i];
      if (inQuotes) {
        if (c === '"') {
          if (t[i + 1] === '"') { cur += '"'; i++; }
          else inQuotes = false;
        } else cur += c;
        continue;
      }
      if (c === '"') { inQuotes = true; continue; }
      if (c === ',') { row.push(cur); cur = ""; continue; }
      if (c === '\r') {
        if (t[i + 1] === '\n') i++;
        row.push(cur); rows.push(row); row = []; cur = "";
        continue;
      }
      if (c === '\n') { row.push(cur); rows.push(row); row = []; cur = ""; continue; }
      cur += c;
    }
    if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
    while (rows.length && rows[rows.length - 1].every(c => (c == null ? "" : String(c)).trim() === "")) rows.pop();
    if (!rows.length) return { headers: [], rows: [] };
    const headers = rows[0].map(h => (h == null ? "" : String(h)).trim());
    const dataRows = rows.slice(1).map(r => r.map(c => (c == null ? "" : String(c)).trim()));
    return { headers, rows: dataRows };
  }

  // Parse pasted transaction text. Returns { items, structure }.
  //
  // options:
  //   today, refYear         — clock reference for no-year dates
  //   amountPos              — "first" | "last" override for which token in a group
  //                            is the transaction amount
  //   secondIsBalance        — bool: when a group has multiple amounts, discard the
  //                            non-picked amounts as running balances (default true).
  //                            When false, non-picked amounts stay in the description.
  //   linesPerTxn            — 1 | 2 | 3 override; suppresses auto-grouping detection
  //   balanceIsAmount        — legacy alias, maps to amountPos: "last"
  //
  // `structure` in the return always reflects the AUTO-DETECTED layout so
  // fingerprints stay stable across override changes; `items` reflect the
  // overrides actually applied.
  function textParse(text, options) {
    options = options || {};
    const today = options.today || new Date();
    const refYear = options.refYear || today.getFullYear();
    const rawLines = String(text || "").split(/\r?\n/);
    const lines = rawLines.map(l => l.replace(/\s+/g, " ").trim()).filter(l => l && /\d/.test(l));
    const emptyStruct = { hasDates: false, hasBalance: false, linesPerTxn: 1, datePos: "start", amountPos: "first", detected: 0 };
    if (!lines.length) return { items: [], structure: emptyStruct };

    const lineData = lines.map(l => ({
      line: l,
      date: findDate(l, refYear, today),
      amounts: findAmounts(l)
    }));

    const dated = lineData.filter(x => x.date).length;
    if (dated === 0) return { items: [], structure: emptyStruct };

    // --- Auto-detected structure (stable across overrides) ---
    const rawRatio = lines.length / dated;
    let autoLinesPerTxn = 1;
    if (rawRatio >= 2.5) autoLinesPerTxn = 3;
    else if (rawRatio >= 1.5) autoLinesPerTxn = 2;
    const autoHasBalance = autoLinesPerTxn === 1 && lineData.some(x => x.amounts.length >= 2);
    const autoAmountPos = autoLinesPerTxn === 1 ? "first" : "last";
    let autoDatePos = "start";
    const first = lineData.find(x => x.date && x.amounts.length);
    if (first) autoDatePos = first.date.index <= first.amounts[0].index ? "start" : "end";
    const structure = {
      hasDates: true,
      hasBalance: autoHasBalance,
      linesPerTxn: autoLinesPerTxn,
      datePos: autoDatePos,
      amountPos: autoAmountPos,
      detected: 0
    };

    // --- Apply overrides for item extraction ---
    let effLinesPerTxn = autoLinesPerTxn;
    if (options.linesPerTxn === 1 || options.linesPerTxn === 2 || options.linesPerTxn === 3) {
      effLinesPerTxn = options.linesPerTxn;
    }
    let effAmountPos = options.amountPos === "first" || options.amountPos === "last"
      ? options.amountPos
      : (effLinesPerTxn === 1 ? "first" : "last");
    if (options.balanceIsAmount) effAmountPos = "last"; // legacy
    const effSecondIsBalance = options.secondIsBalance == null ? true : !!options.secondIsBalance;

    // Build groups using effLinesPerTxn.
    const groups = [];
    if (effLinesPerTxn === 1) {
      for (const ld of lineData) if (ld.date && ld.amounts.length) groups.push([ld]);
    } else {
      let cur = null;
      for (const ld of lineData) {
        if (ld.date) {
          if (cur) groups.push(cur);
          cur = [ld];
        } else if (cur) cur.push(ld);
      }
      if (cur) groups.push(cur);
    }

    const items = [];
    for (const g of groups) {
      const dEntry = g.find(x => x.date);
      if (!dEntry) continue;
      const allAmts = [];
      for (const l of g) l.amounts.forEach(a => allAmts.push(a));
      if (!allAmts.length) continue;

      const chosen = effAmountPos === "last" ? allAmts[allAmts.length - 1] : allAmts[0];
      const txnAmt = chosen.value;

      // Description = combined text with the date and (usually) all amount tokens stripped.
      // If secondIsBalance is false, keep the non-chosen amount tokens in the description.
      let desc = g.map(l => l.line).join(" ");
      desc = desc.split(dEntry.date.raw).join(" ");
      if (effSecondIsBalance) {
        for (const l of g) for (const a of l.amounts) desc = desc.split(a.raw).join(" ");
      } else {
        desc = desc.split(chosen.raw).join(" ");
      }
      desc = desc.replace(/\s+/g, " ").trim();

      items.push({ date: dEntry.date.iso, amount: txnAmt, description: desc });
    }
    structure.detected = items.length;
    return { items, structure };
  }

  function computePasteFingerprint(structure) {
    if (!structure) return "";
    return `date-${structure.datePos}|amount-${structure.amountPos}|${structure.linesPerTxn}-line|balance-${structure.hasBalance ? "yes" : "no"}`;
  }
  function computeCsvFingerprint(headers) {
    return (headers || []).map(h => String(h || "").trim().toLowerCase()).join(",");
  }

  // Strip noise from a merchant description and return the leading name.
  // Identical for CSV and paste so a mapping learned via one path applies to the other.
  function normalizeMerchantKey(desc) {
    if (!desc) return "";
    let s = String(desc).toUpperCase();
    s = s.replace(/\bPENDING\b/g, " ");
    // Drop trailing card-number tail like "*1234" that may sit inside a word.
    s = s.replace(/[\*#][0-9]+/g, " ");
    // Split on non-letters; take alphabetic tokens of length >= 2.
    const tokens = s.match(/[A-Z]{2,}/g) || [];
    // Take the first token as the merchant name. Conservative but robust:
    // guarantees CSV "HEB #613 AUSTIN TX" and paste "HEB PENDING" normalize identically.
    return tokens.length ? tokens[0] : "";
  }

  function normalizeDescForCompare(s) {
    return String(s == null ? "" : s).toUpperCase().replace(/[^A-Z0-9]/g, "");
  }

  // Tier 1: same date + same amount + same normalized description (against .note).
  function isExactDupe(cand, existing) {
    const nd = normalizeDescForCompare(cand.description);
    const amt = Math.round(Math.abs(Number(cand.amount) || 0) * 100);
    for (const t of existing) {
      if (t.date !== cand.date) continue;
      if (Math.round(Math.abs(Number(t.amount) || 0) * 100) !== amt) continue;
      if (normalizeDescForCompare(t.note || "") === nd) return true;
    }
    return false;
  }

  // Tier 2: same amount, |date delta| ≤ 3 days, only vs source:"manual".
  function findFuzzyMatch(cand, existing) {
    const amt = Math.round(Math.abs(Number(cand.amount) || 0) * 100);
    const cDate = new Date(cand.date + "T00:00:00");
    if (isNaN(cDate)) return null;
    for (const t of existing) {
      if ((t.source || "manual") !== "manual") continue;
      if (Math.round(Math.abs(Number(t.amount) || 0) * 100) !== amt) continue;
      const tDate = new Date(String(t.date || "") + "T00:00:00");
      if (isNaN(tDate)) continue;
      const days = Math.abs((cDate - tDate) / 86400000);
      if (days <= 3) return t;
    }
    return null;
  }

  return {
    parseDate, findDate, findAmounts,
    csvParse, textParse,
    computePasteFingerprint, computeCsvFingerprint,
    normalizeMerchantKey, normalizeDescForCompare,
    isExactDupe, findFuzzyMatch
  };
})();

  function fuzzyLabelMatch(a, b) {
    const A = String(a || "").toUpperCase().trim();
    const B = String(b || "").toUpperCase().trim();
    if (!A || !B) return false;
    if (A === B) return true;
    if (A.includes(B) || B.includes(A)) return true;
    const at = (A.match(/[A-Z]+/g) || [])[0] || "";
    const bt = (B.match(/[A-Z]+/g) || [])[0] || "";
    if (at.length >= 3 && at === bt) return true;
    return false;
  }

  // Pure: compute a new debts array given an "old" (existing) and "new" (post-edit)
  // transaction. Restoring an old debt payment adds the amount back; applying a new
  // debt payment subtracts it. Called for edits and deletes.
  function applyDebtDelta(debts, oldTxn, newTxn) {
    let next = (debts || []).map(d => ({ ...d }));
    if (oldTxn && oldTxn.categoryType === "debt" && oldTxn.categoryId) {
      next = next.map(d => {
        if (d.id !== oldTxn.categoryId) return d;
        const bal = (Number(d.balance) || 0) + (Number(oldTxn.amount) || 0);
        const cap = Number(d.originalBalance);
        const capped = isFinite(cap) && cap > 0 ? Math.min(bal, cap) : bal;
        return { ...d, balance: Math.round(capped * 100) / 100 };
      });
    }
    if (newTxn && newTxn.categoryType === "debt" && newTxn.categoryId) {
      next = next.map(d => {
        if (d.id !== newTxn.categoryId) return d;
        const bal = Math.max(0, (Number(d.balance) || 0) - (Number(newTxn.amount) || 0));
        return { ...d, balance: Math.round(bal * 100) / 100 };
      });
    }
    return next;
  }

        ` : `<div class="meta">NO CARDS; ADD THEM IN SETTINGS</div>`}
      </div>` : "";

    const txnRowsHtml = txns.length ? txns.map(t => renderTxnRow(s, t, catLookup)).join("") :
      `<div class="meta" style="padding: 12px 0;">NO TRANSACTIONS YET THIS MONTH</div>`;
    // Counter for transactions that were imported without a category selected.
    const needsCount = txns.filter(t => t.needsCategory || (t.source === "import" && !t.categoryId)).length;
    const needsCounterHtml = needsCount > 0
      ? `<div class="sub-label text-danger" style="margin-top: 12px;">${needsCount} TRANSACTION${needsCount === 1 ? "" : "S"} NEED A CATEGORY</div>`
      : "";

    root.innerHTML = `
      <div class="screen">
        ${gear()}
        <section class="section lime">
          <div class="sub-label">SAFE TO SPEND</div>
          <div class="hero ${heroDanger}">${Util.esc(Util.fmtMoney(safe, 0))}</div>
          <div class="sub-label" style="margin-top:8px;">${Util.esc(Util.fmtMoney(budgeted, 0))} BUDGETED · ${Util.esc(Util.fmtMoney(credit, 0))} ON CREDIT</div>
        </section>

        <section class="section gray">
          <div class="section-label">→ LOG A PURCHASE</div>
          <div class="stack-24" style="margin-top:24px;">
            <div>
              <div class="sub-label">AMOUNT</div>
              <input class="underline big num-input" id="log-amount" inputmode="decimal" placeholder="$0.00" value="${Util.esc(logForm.amount)}">
            </div>
            <div>
              <div class="sub-label">CATEGORY</div>
              <div class="chips">${chipsHtml || `<div class="meta">NO CATEGORIES; ADD SOME IN SETTINGS</div>`}</div>
            </div>
            <div>
              <div class="sub-label">PAYMENT</div>
              <div class="toggle-row">
                <button class="toggle ${logForm.paymentType==='cash'?'active':''}" data-action="pick-pay" data-pay="cash">CASH</button>
                <button class="toggle ${logForm.paymentType==='credit'?'active':''}" data-action="pick-pay" data-pay="credit">CREDIT</button>
              </div>
            </div>
            ${cardChipsHtml}
            ${personChips}
            <div>
              <div class="sub-label">NOTE</div>
              <input class="underline" id="log-note" placeholder="NOTE (OPTIONAL)" value="${Util.esc(logForm.note)}" maxlength="60">
            </div>
            ${formErrors.log ? `<div class="text-danger meta">${Util.esc(formErrors.log)}</div>` : ""}
            <button class="cta" data-action="log-it">→ LOG IT</button>
          </div>
        </section>

        <section class="section off-white">
          <button class="link" data-action="import-toggle">${importMenuOpen ? "× CLOSE" : "→ IMPORT FROM BANK"}</button>
          ${importMenuOpen ? `
            <div class="import-actions">
              <button class="cta ghost" data-action="import-csv-pick">→ UPLOAD CSV FILE</button>
              <button class="cta ghost" data-action="import-paste">→ PASTE TRANSACTIONS</button>
              <input type="file" id="csv-file-input" accept=".csv,text/csv,text/plain" style="display:none;">
            </div>
          ` : ""}
          <div class="sub-label" style="margin-top: 24px;">THIS MONTH</div>
          ${(postImportNotice && !postImportNotice.dismissed) ? `
            <div class="import-notice ${postImportNotice.offMonth > 0 ? 'text-danger' : ''}" style="margin-top:12px; display:flex; justify-content:space-between; align-items:center; gap:8px;">
              <span class="sub-label">IMPORTED ${postImportNotice.total} TRANSACTION${postImportNotice.total===1?'':'S'}${postImportNotice.offMonth > 0 ? `; ${postImportNotice.offMonth} ARE IN OTHER MONTHS AND WON'T SHOW IN THIS MONTH'S LIST` : ''}</span>
              <button class="link" data-action="dismiss-import-notice">×</button>

  function bindLogEvents(s) {
    const amt = root.querySelector("#log-amount");
    if (amt) amt.addEventListener("input", e => { logForm.amount = e.target.value; });
    const note = root.querySelector("#log-note");
    if (note) note.addEventListener("input", e => { logForm.note = e.target.value; });

    root.querySelectorAll("[data-action=pick-cat]").forEach(el => {
      el.addEventListener("click", () => {
        logForm.categoryId = el.dataset.id;
        logForm.categoryType = el.dataset.type;
        render();
      });
    });
    root.querySelectorAll("[data-action=pick-pay]").forEach(el => {
      el.addEventListener("click", () => {
        logForm.paymentType = el.dataset.pay;
        if (logForm.paymentType !== "credit") logForm.cardId = null;
        render();
      });
    });
    root.querySelectorAll("[data-action=pick-card]").forEach(el => {
      el.addEventListener("click", () => { logForm.cardId = el.dataset.id || null; render(); });
    });
    root.querySelectorAll("[data-action=pick-person]").forEach(el => {
      el.addEventListener("click", () => { logForm.person = el.dataset.person; render(); });
    });
    const cta = root.querySelector("[data-action=log-it]");
    if (cta) cta.addEventListener("click", () => submitLog(s));

    // Import entry point
    root.querySelectorAll("[data-action=import-toggle]").forEach(el => {
      el.addEventListener("click", () => { importMenuOpen = !importMenuOpen; render(); });
    });
    root.querySelectorAll("[data-action=dismiss-import-notice]").forEach(el => {
      el.addEventListener("click", () => { if (postImportNotice) postImportNotice.dismissed = true; render(); });
    });
    root.querySelectorAll("[data-action=import-csv-pick]").forEach(el => {
      el.addEventListener("click", () => {
        const fi = root.querySelector("#csv-file-input");
        if (fi) fi.click();
      });
    });
    const fi = root.querySelector("#csv-file-input");
    if (fi) fi.addEventListener("change", (e) => onCsvFilePicked(s, e.target.files && e.target.files[0]));
    root.querySelectorAll("[data-action=import-paste]").forEach(el => {
      el.addEventListener("click", () => openPasteOverlay());
    });

    bindTxnRowEvents(s);
  }

  // Render a single transaction row plus (optionally) its inline editor / delete confirm.
  function renderTxnRow(s, t, catLookup) {
    const catLabel = catLookup[t.categoryId] || "";
    const needsCat = !!t.needsCategory || (t.source === "import" && !t.categoryId);
    let tag;
    if (needsCat) {
      tag = "ASSIGN";
    } else if (t.paymentType === "credit") {
      const cl = cardLabelFor(s, t.cardId);
      tag = cl ? cl : "CREDIT";
    } else if (t.person && t.person !== "JOINT") {
      tag = t.person;
    } else {
      tag = "CASH";
    }
    const edit = txnEdits[t.id];
    const expanded = !!edit;
    const err = formErrors["txn_" + t.id];
    const row = `
      <div class="txn-row ${expanded ? 'expanded' : ''} ${needsCat ? 'needs-category' : ''}" data-action="toggle-txn" data-id="${Util.esc(t.id)}">
        <div class="txn-date">${Util.esc(Util.fmtDateShort(t.date))}</div>
        <div class="txn-note">
          ${Util.esc(t.note || catLabel)}
          <span class="txn-tag ${needsCat ? 'needs' : ''}">${Util.esc(tag)}</span>
        </div>
        <div class="txn-cat">${Util.esc(catLabel)}</div>
        <div class="txn-amt">-${Util.esc(Util.fmtMoney(Number(t.amount)||0, 2))}</div>
      </div>`;
    if (!expanded) return row;
    return row + renderTxnEditor(s, t, edit, err);
  }

  function renderTxnEditor(s, t, edit, err) {
    const f = edit.form;
    const isCouple = s.settings && s.settings.mode === "couple";
    const cards = s.creditCards || [];

    // Category chips
    const chips = [];
    (s.spendingCategories||[]).forEach(c => chips.push({ id: c.id, label: c.label, type: "spending" }));
    (s.bills||[]).forEach(b => chips.push({ id: b.id, label: b.label, type: "bill" }));
    (s.debts||[]).forEach(d => chips.push({ id: d.id, label: d.label + " (DEBT)", type: "debt" }));
    const chipsHtml = chips.map(c => {
      const cls = "chip " + (f.categoryId === c.id ? "active " : "") +
        (c.type === "debt" ? "debt-chip " : (c.type === "bill" ? "bill-chip " : ""));
      return `<button class="${cls}" data-action="txn-edit-cat" data-txn="${Util.esc(t.id)}" data-id="${Util.esc(c.id)}" data-type="${c.type}">${Util.esc(c.label)}</button>`;
    }).join("");

    // Card row lives inside .field for the same min-width:0 cascade the CATEGORY
    // row gets. Prior to V9 this was a plain <div> — reproduced the iOS overflow
    // when a credit txn had 4+ cards and 10+ categories.
    const cardChipsHtml = f.paymentType === "credit" ? `
      <div class="field">
        <label>WHICH CARD</label>
        ${cards.length ? `
          <div class="chips">
            ${cards.map(c => `<button class="chip ${f.cardId===c.id?'active':''}" data-action="txn-edit-card" data-txn="${Util.esc(t.id)}" data-id="${Util.esc(c.id)}">${Util.esc(c.label)}</button>`).join("")}
            ${f.cardId ? `<button class="chip" data-action="txn-edit-card" data-txn="${Util.esc(t.id)}" data-id="">× NONE</button>` : ""}
          </div>
        ` : `<div class="meta">NO CARDS; ADD THEM IN SETTINGS</div>`}
      </div>` : "";

    const personChips = isCouple ? `
      <div class="field">
        <label>WHO PAID</label>
        <div class="chips">
          ${[s.settings.names[0], s.settings.names[1], "JOINT"].map(p => {
            const val = p.toUpperCase();
            return `<button class="chip ${f.person===val?'active':''}" data-action="txn-edit-person" data-txn="${Util.esc(t.id)}" data-person="${Util.esc(val)}">${Util.esc(p)}</button>`;
          }).join("")}
        </div>
      </div>` : "";

    const confirmHtml = edit.deleteConfirm ? `
      <div class="txn-confirm">
        <span>DELETE?</span>
        <button data-action="txn-delete-cancel" data-txn="${Util.esc(t.id)}">NO</button>
        <button class="yes" data-action="txn-delete-yes" data-txn="${Util.esc(t.id)}">YES</button>
      </div>` : `
      <div class="txn-actions">
        <button data-action="txn-close" data-txn="${Util.esc(t.id)}">× CLOSE</button>
        <button class="del-btn" data-action="txn-delete-ask" data-txn="${Util.esc(t.id)}">× DELETE</button>
      </div>`;

    return `
      <div class="inline-form">
        <div class="sub-label">EDIT TRANSACTION</div>
        <div class="field"><label>AMOUNT</label><input data-action="txn-edit-field" data-txn="${Util.esc(t.id)}" data-field="amount" value="${Util.esc(f.amount)}" inputmode="decimal"></div>
        <div class="field"><label>CATEGORY</label><div class="chips" style="margin-top:4px;">${chipsHtml}</div></div>
        <div class="field"><label>PAYMENT</label>
          <div class="toggle-row">
            <button class="toggle ${f.paymentType==='cash'?'active':''}" data-action="txn-edit-pay" data-txn="${Util.esc(t.id)}" data-pay="cash">CASH</button>
            <button class="toggle ${f.paymentType==='credit'?'active':''}" data-action="txn-edit-pay" data-txn="${Util.esc(t.id)}" data-pay="credit">CREDIT</button>
          </div>
        </div>
        ${cardChipsHtml}
        ${personChips}
        <div class="field"><label>NOTE</label><input data-action="txn-edit-field" data-txn="${Util.esc(t.id)}" data-field="note" value="${Util.esc(f.note)}" maxlength="60"></div>
        ${err ? `<div class="text-danger meta">${Util.esc(err)}</div>` : ""}
        <div class="row-actions">
          <button class="cta ghost" data-action="txn-close" data-txn="${Util.esc(t.id)}">× CANCEL</button>
          <button class="cta" data-action="txn-save" data-txn="${Util.esc(t.id)}">→ SAVE</button>
        </div>
        ${confirmHtml}
      </div>`;
  }

  function findTxn(s, id) { return (s.transactions||[]).find(x => x.id === id); }

  function openTxnEditor(s, id) {
    const t = findTxn(s, id);
    if (!t) return;
    txnEdits[id] = {
      form: {
        amount: String(Number(t.amount) || 0),
        categoryId: t.categoryId || null,
        categoryType: t.categoryType || null,
        paymentType: t.paymentType || "cash",
        person: t.person || "JOINT",
        note: t.note || "",
        cardId: t.cardId || null
      },
      deleteConfirm: false
    };
    formErrors["txn_" + id] = "";
  }

  function closeTxnEditor(id) {
    delete txnEdits[id];
    delete formErrors["txn_" + id];
  }

  function bindTxnRowEvents(s) {
    root.querySelectorAll("[data-action=toggle-txn]").forEach(el => {
      el.addEventListener("click", (e) => {
        // Ignore clicks that already targeted a button inside an expanded editor.
        if (e.target !== el && e.target.closest("button,input")) return;
        const id = el.dataset.id;
        if (txnEdits[id]) closeTxnEditor(id); else openTxnEditor(s, id);
        render();
      });
    });
    root.querySelectorAll("[data-action=txn-close]").forEach(el => {
      el.addEventListener("click", (e) => { e.stopPropagation(); closeTxnEditor(el.dataset.txn); render(); });
    });
    root.querySelectorAll("[data-action=txn-edit-field]").forEach(el => {
      el.addEventListener("input", (e) => {
        e.stopPropagation();
        const ed = txnEdits[el.dataset.txn]; if (!ed) return;
        ed.form[el.dataset.field] = e.target.value;
      });
      el.addEventListener("click", e => e.stopPropagation());
    });
    root.querySelectorAll("[data-action=txn-edit-cat]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const ed = txnEdits[el.dataset.txn]; if (!ed) return;
        ed.form.categoryId = el.dataset.id;
        ed.form.categoryType = el.dataset.type;
        render();
      });
    });
    root.querySelectorAll("[data-action=txn-edit-pay]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const ed = txnEdits[el.dataset.txn]; if (!ed) return;
        ed.form.paymentType = el.dataset.pay;
        if (ed.form.paymentType !== "credit") ed.form.cardId = null;
        render();
      });
    });
    root.querySelectorAll("[data-action=txn-edit-card]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const ed = txnEdits[el.dataset.txn]; if (!ed) return;
        ed.form.cardId = el.dataset.id || null;
        render();
      });
    });
    root.querySelectorAll("[data-action=txn-edit-person]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const ed = txnEdits[el.dataset.txn]; if (!ed) return;
        ed.form.person = el.dataset.person;
        render();
      });
    });
    root.querySelectorAll("[data-action=txn-save]").forEach(el => {
      el.addEventListener("click", (e) => { e.stopPropagation(); saveTxnEdit(s, el.dataset.txn); });
    });
    root.querySelectorAll("[data-action=txn-delete-ask]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const ed = txnEdits[el.dataset.txn]; if (!ed) return;
        ed.deleteConfirm = true;
        render();
      });
    });
    root.querySelectorAll("[data-action=txn-delete-cancel]").forEach(el => {
      el.addEventListener("click", (e) => {
        e.stopPropagation();
        const ed = txnEdits[el.dataset.txn]; if (!ed) return;
        ed.deleteConfirm = false;
        render();
      });
    });
    root.querySelectorAll("[data-action=txn-delete-yes]").forEach(el => {
      el.addEventListener("click", (e) => { e.stopPropagation(); deleteTxn(s, el.dataset.txn); });
    });
  }

  async function saveTxnEdit(s, id) {
    const ed = txnEdits[id];
    const old = findTxn(s, id);
    if (!ed || !old) return;
    formErrors["txn_" + id] = "";
    const amount = parseFloat(ed.form.amount);
    if (!isFinite(amount) || amount <= 0) {
      formErrors["txn_" + id] = "ENTER A VALID AMOUNT"; render(); return;
    }
    if (!ed.form.categoryId) {
      formErrors["txn_" + id] = "PICK A CATEGORY"; render(); return;
    }
    const isCouple = s.settings && s.settings.mode === "couple";
    const person = isCouple ? ed.form.person : (s.settings.names[0] || "ME").toUpperCase();
    const updated = {
      ...old,
      amount: Math.round(amount * 100) / 100,
      categoryId: ed.form.categoryId,
      categoryType: ed.form.categoryType,
      paymentType: ed.form.paymentType,
      person: person,
      note: (ed.form.note || "").toUpperCase().slice(0, 60),
      cardId: ed.form.paymentType === "credit" ? (ed.form.cardId || null) : null,
      source: old.source || "manual"
    };
    // Assigning a category to a previously-import-with-no-category txn:
    // clear the flag and also update merchantMap so future imports learn from it.
    if (updated.categoryId) delete updated.needsCategory;
    const patch = {
      transactions: (s.transactions||[]).map(x => x.id === id ? updated : x),
      debts: applyDebtDelta(s.debts, old, updated)
    };
    if (updated.categoryId && old.source === "import" && (old.needsCategory || !old.categoryId)) {
      const key = old.merchantKey || ImportEngine.normalizeMerchantKey(old.note || updated.note || "");
      if (key) patch.merchantMap = { ...(s.merchantMap || {}), [key]: updated.categoryId };
    }
    try {
      await DataService.update(patch);
      closeTxnEditor(id);
      render();
    } catch (err) { alert("COULDN'T SAVE; CHECK CONNECTION"); console.warn(err); }
  }

  async function deleteTxn(s, id) {
    const old = findTxn(s, id);
    if (!old) return;
    const patch = {
      transactions: (s.transactions||[]).filter(x => x.id !== id),
      debts: applyDebtDelta(s.debts, old, null)
    };
    try {
      await DataService.update(patch);
      closeTxnEditor(id);
      render();
    } catch (err) { alert("COULDN'T DELETE; CHECK CONNECTION"); console.warn(err); }
  }

  async function submitLog(s) {
    formErrors.log = "";
    const amount = parseFloat(logForm.amount);
    if (!isFinite(amount) || amount <= 0) {
      formErrors.log = "ENTER A VALID AMOUNT";
      render();
      return;
    }
    if (!logForm.categoryId) {
      formErrors.log = "PICK A CATEGORY";
      render();
      return;
    }
    const isCouple = s.settings && s.settings.mode === "couple";
    const person = isCouple ? logForm.person : (s.settings.names[0] || "ME").toUpperCase();
    const txn = {
      id: Util.uuid(),
      date: Util.todayISO(),
      amount: Math.round(amount * 100) / 100,
      categoryId: logForm.categoryId,
      categoryType: logForm.categoryType,
      note: (logForm.note || "").toUpperCase().slice(0, 60),
      paymentType: logForm.paymentType,
      person: person,
      month: s.currentMonth,
      cardId: logForm.paymentType === "credit" ? (logForm.cardId || null) : null,
      source: "manual"
    };
    const patch = { transactions: [...(s.transactions||[]), txn] };

    // If logging against a debt, decrement its balance
    if (logForm.categoryType === "debt") {
      const debts = (s.debts||[]).map(d => {
        if (d.id !== logForm.categoryId) return d;
        const newBal = Math.max(0, (Number(d.balance)||0) - amount);
        return { ...d, balance: Math.round(newBal * 100) / 100 };
      });
      patch.debts = debts;
    }

    try {
      await DataService.update(patch);
      // Reset form
      logForm.amount = "";
      logForm.note = "";
      // keep last-used category and payment for convenience
      render();
    } catch (err) {
      console.warn(err);
      alert("COULDN'T SAVE; CHECK CONNECTION");
    }
  }

  /* ------------- DASHBOARD ------------- */
  function renderDashboard(s) {
    const safe = BudgetEngine.safeToSpend(s);
    const income = BudgetEngine.totalIncome(s);
    const budgeted = BudgetEngine.totalBudgeted(s);
    const isCouple = s.settings && s.settings.mode === "couple";
    const heroDanger = safe < 0 ? "danger" : "";

    // Debt block
    const totalDebt = BudgetEngine.totalDebt(s);
    const mins = BudgetEngine.totalDebtMins(s);
    const target = BudgetEngine.targetDebt(s);

    // Category rows
    const cats = (s.spendingCategories||[]);
    const catRows = cats.map(c => {
      const spent = BudgetEngine.categorySpent(s, c.id);
      const roll = BudgetEngine.rolloverAmount(s, c.id);
      const budget = BudgetEngine.num(c.budgeted) + roll;
      const remaining = budget - spent;
      const pct = budget > 0 ? Math.min(100, (spent / budget) * 100) : 0;
      const barClass = pct >= 90 ? "danger" : (pct >= 75 ? "warn" : "");
      const remainClass = remaining < 0 ? "text-danger" : "";
      return `
        <div class="cat-row">
          <div class="cat-line">
            <span>${Util.esc(c.label)}</span>
            <span>${Util.esc(Util.fmtMoney(spent,0))} / ${Util.esc(Util.fmtMoney(budget,0))}</span>
          </div>
          <div class="progress ${barClass}"><span style="width:${pct}%"></span></div>
          <div class="cat-remaining ${remainClass}">${Util.esc(Util.fmtMoney(remaining,0))} REMAINING${roll ? " · ROLLOVER " + Util.esc(Util.fmtMoney(roll,0)) : ""}</div>
        </div>`;
    }).join("") || `<div class="meta">NO CATEGORIES YET</div>`;

    // Credit block
    const unpaid = BudgetEngine.totalUnpaidCredit(s);
    const cashCover = BudgetEngine.cashToCover(s);
    const covered = cashCover >= unpaid;
    const shortfall = unpaid - cashCover;

    // Per-card breakdown of unpaid credit this month.
    // Transactions whose card was deleted (or that never had one) fall into "CREDIT".
    const cards = s.creditCards || [];
    const cardTotals = new Map();
    let untagged = 0;
    (s.transactions || []).forEach(t => {
      if (t.paymentType !== "credit" || t.month !== s.currentMonth) return;
      const amt = Number(t.amount) || 0;
      const label = cardLabelFor(s, t.cardId);
      if (label) cardTotals.set(label, (cardTotals.get(label) || 0) + amt);
      else untagged += amt;
    });
    const cardRowsHtml = (cards.length || untagged > 0) ? (() => {
      const rows = [];
      cards.forEach(c => {
        const v = cardTotals.get(c.label) || 0;
        const linkedDebt = c.debtId ? (s.debts||[]).find(d => d.id === c.debtId) : null;
        const debtSuffix = linkedDebt ? ` (DEBT: ${Util.fmtMoney(Number(linkedDebt.balance)||0,0)})` : "";
        rows.push(`<div class="sub-label" style="margin-top:4px;">${Util.esc(c.label)}: ${Util.esc(Util.fmtMoney(v,0))}${Util.esc(debtSuffix)}</div>`);
      });
      if (untagged > 0) rows.push(`<div class="sub-label" style="margin-top:4px;">CREDIT: ${Util.esc(Util.fmtMoney(untagged,0))}</div>`);
      return rows.join("");
    })() : "";

    // Person split
    let peopleHtml = "";
    if (isCouple) {
      const p1 = (s.settings.names[0]||"").toUpperCase();
      const p2 = (s.settings.names[1]||"").toUpperCase();
      const p1Spent = BudgetEngine.personSpent(s, p1);

  // Convert "AUG 2025" -> "2025-08" (for fmtMonthLong)
  function monthYMFromShort(shortStr) {
    if (!shortStr || shortStr === "NOT YET") return null;
    const parts = shortStr.split(" ");
    if (parts.length !== 2) return null;
    const names = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    const idx = names.indexOf(parts[0]);
    if (idx < 0) return null;
    return `${parts[1]}-${String(idx+1).padStart(2,"0")}`;
  }

  async function saveDebtPayment(s, debtId) {
    const f = debtPayForms[debtId];
    if (!f) return;
    f.error = "";
    const amount = parseFloat(f.amount);
    if (!isFinite(amount) || amount <= 0) { f.error = "ENTER A VALID AMOUNT"; render(); return; }
    const debt = (s.debts || []).find(d => d.id === debtId);
    if (!debt) { f.error = "DEBT NOT FOUND"; render(); return; }
    const isCouple = s.settings && s.settings.mode === "couple";
    const person = isCouple ? (f.person || "JOINT") : ((s.settings.names && s.settings.names[0]) || "ME").toUpperCase();
    const dateISO = Util.todayISO();
    const txn = {
      id: Util.uuid(),
      date: dateISO,
      amount: Math.round(amount * 100) / 100,
      categoryId: debtId,
      categoryType: "debt",
      note: (f.note || "").toUpperCase().slice(0, 60),
      paymentType: f.paymentType || "cash",
      person: person,
      month: dateISO.slice(0, 7),
      cardId: f.paymentType === "credit" ? (f.cardId || null) : null,
      source: "manual"
    };
    // Reuse applyDebtDelta so the debt-balance reconciliation logic is shared
    // with the txn editor's save path — one source of truth for consistency.
    const patch = {
      transactions: [...(s.transactions || []), txn],
      debts: applyDebtDelta(s.debts, null, txn)
    };
    try {
      await DataService.update(patch);
      delete debtPayForms[debtId];
      render();
    } catch (err) { f.error = "COULDN'T SAVE; CHECK CONNECTION"; render(); console.warn(err); }
  }

  async function saveNewDebt(s) {
    formErrors.add_debt = "";
    const f = addForms.debt || {};
    const label = (f.label||"").trim();
    if (!label) { formErrors.add_debt = "LABEL REQUIRED"; render(); return; }
    // Fuzzy-match against existing cards before saving.
    if (!f.linkChoice) {
      const match = (s.creditCards || []).find(c => fuzzyLabelMatch(c.label, label));
      if (match) {
        f.pendingMatch = { targetId: match.id, targetLabel: match.label };
        render(); return;
      }
    }
    const balance = parseFloat(f.balance) || 0;
    const min = parseFloat(f.minimumPayment) || 0;
    const rate = parseFloat(f.interestRate) || 0;
    const linkCardId = (f.linkChoice === "yes" && f.pendingMatch) ? f.pendingMatch.targetId : null;
    const newDebt = {
      id: Util.uuid(),
      label: label.toUpperCase(),
      balance: balance,
      originalBalance: balance,
      minimumPayment: min,
      interestRate: rate,
      cardId: linkCardId
    };
    const patch = { debts: [...(s.debts||[]), newDebt] };
    if (linkCardId) {
      patch.creditCards = (s.creditCards || []).map(c => c.id === linkCardId ? { ...c, debtId: newDebt.id } : c);
    }
    try {
      await DataService.update(patch);
      addForms.debt = null;
      render();
    } catch (err) { alert("COULDN'T SAVE"); console.warn(err); }
  }

  function findBalance(s, profileId) {
    return (s.balances || []).find(b => b.profileId === profileId) || null;
  }

  function renderBalanceRow(s, profile) {
    const bal = findBalance(s, profile.id);
    const edit = balanceEdits[profile.id];
    const dateLine = bal ? `UPDATED ${Util.esc(Util.fmtDateShort(bal.updatedDate))}` : "NEVER UPDATED";
    return `
      <div class="list-item">
        <span>${Util.esc(profile.label)}</span>
        <span>${bal ? Util.esc(Util.fmtMoney(Number(bal.amount)||0,0)) : "$0"}</span>
        <button class="link" data-action="balance-edit-toggle" data-id="${Util.esc(profile.id)}">${edit && edit.open ? "× CANCEL" : "UPDATE →"}</button>

            <label>NEW BALANCE</label>

  function renderListItem(kind, item, s) {
    const editing = editStates[kind + "_" + item.id];
    const isLocked = false;
    let mainCell = "";
    let amtCell = "";
    if (kind === "income") {
      mainCell = `<span>${Util.esc(item.label)} · DUE ${item.dueDateOfMonth || 1}</span>`;
      amtCell = `<span>${Util.esc(Util.fmtMoney(Number(item.amount)||0,0))}</span>`;
    } else if (kind === "bill" || kind === "savings") {
      mainCell = `<span>${Util.esc(item.label)} · DUE ${item.dueDateOfMonth || 1}</span>`;
      amtCell = `<span>${Util.esc(Util.fmtMoney(Number(item.amount)||0,0))}</span>`;
    } else if (kind === "spending") {
      mainCell = `<span>${Util.esc(item.label)}</span>`;
      amtCell = `<span>${Util.esc(Util.fmtMoney(Number(item.budgeted)||0,0))}</span>`;
    } else if (kind === "debt") {
      mainCell = `<span>${Util.esc(item.label)}</span>`;
      amtCell = `<span>${Util.esc(Util.fmtMoney(Number(item.balance)||0,0))} · MIN ${Util.esc(Util.fmtMoney(Number(item.minimumPayment)||0,0))}</span>`;
    } else if (kind === "card") {
      const linkedDebt = item.debtId ? (s.debts||[]).find(d => d.id === item.debtId) : null;
      mainCell = `<span>${Util.esc(item.label)}${linkedDebt ? `<div class="link-tag">LINKED: ${Util.esc(linkedDebt.label)} DEBT</div>` : ""}</span>`;
      amtCell = `<span class="locked-tag">CARD</span>`;
    }
    const actions = `
      <span class="row-right">
        <button class="link" data-action="edit-item" data-kind="${kind}" data-id="${Util.esc(item.id)}">EDIT</button>
        <button class="del" data-action="delete-item" data-kind="${kind}" data-id="${Util.esc(item.id)}">×</button>
      </span>`;
    const editForm = editing ? renderEditForm(kind, item) : "";
    return `<div class="list-item ${isLocked ? 'locked' : ''}">${mainCell}${amtCell}${actions}</div>${editForm}`;
  }

  function renderEditForm(kind, item) {

    const isSpending = kind === "spending";
    const isCard = kind === "card";
    const hasDate = (kind === "bill" || kind === "savings" || kind === "income");
    const amountField = isDebt ? "balance" : (isSpending ? "budgeted" : "amount");
    const amountLabel = isDebt ? "BALANCE" : (isSpending ? "BUDGETED" : "AMOUNT");
    if (isCard) {
      return `
        <div class="inline-form" data-edit-form data-kind="${kind}" data-id="${Util.esc(item.id)}">
          <div class="field"><label>LABEL</label><input data-edit-field="label" value="${Util.esc(item.label||'')}"></div>
          <div class="row-actions">
            <button class="cta ghost" data-action="cancel-edit" data-kind="${kind}" data-id="${Util.esc(item.id)}">× CANCEL</button>
            <button class="cta" data-action="save-edit" data-kind="${kind}" data-id="${Util.esc(item.id)}">→ SAVE</button>
          </div>
        </div>`;
    }
    return `
      <div class="inline-form" data-edit-form data-kind="${kind}" data-id="${Util.esc(item.id)}">
        <div class="field"><label>LABEL</label><input data-edit-field="label" value="${Util.esc(item.label||'')}"></div>
        <div class="field"><label>${amountLabel}</label><input data-edit-field="${amountField}" value="${Util.esc(item[amountField]==null?'':item[amountField])}" inputmode="decimal"></div>
        ${hasDate ? `<div class="field"><label>DUE DAY</label><input data-edit-field="dueDateOfMonth" value="${Util.esc(item.dueDateOfMonth||1)}" inputmode="numeric"></div>` : ""}
        ${isDebt ? `
          <div class="field"><label>MIN PAYMENT</label><input data-edit-field="minimumPayment" value="${Util.esc(item.minimumPayment==null?'':item.minimumPayment)}" inputmode="decimal"></div>
          <div class="field"><label>INTEREST %</label><input data-edit-field="interestRate" value="${Util.esc(item.interestRate==null?'':item.interestRate)}" inputmode="decimal"></div>
        ` : ""}
        <div class="row-actions">
          <button class="cta ghost" data-action="cancel-edit" data-kind="${kind}" data-id="${Util.esc(item.id)}">× CANCEL</button>
          <button class="cta" data-action="save-edit" data-kind="${kind}" data-id="${Util.esc(item.id)}">→ SAVE</button>
        </div>
      </div>`;
  }

  function renderAddForm(kind) {
    const f = addForms[kind];
    const isSpending = kind === "spending";
    const isIncome = kind === "income";
    const hasDate = (kind === "bill" || kind === "savings" || kind === "income");
    const amountField = isSpending ? "budgeted" : "amount";
    const amountLabel = isSpending ? "BUDGETED" : "AMOUNT";
    const err = formErrors["add_" + kind];
    return `
      <div class="inline-form">
        <div class="sub-label">NEW ${Util.esc(kind.toUpperCase())}</div>
        <div class="field"><label>LABEL</label><input data-action="add-form-input" data-kind="${kind}" data-field="label" value="${Util.esc(f.label)}"></div>
        <div class="field"><label>${amountLabel}</label><input data-action="add-form-input" data-kind="${kind}" data-field="${amountField}" value="${Util.esc(f[amountField])}" inputmode="decimal"></div>
        ${hasDate ? `<div class="field"><label>DUE DAY OF MONTH</label><input data-action="add-form-input" data-kind="${kind}" data-field="dueDateOfMonth" value="${Util.esc(f.dueDateOfMonth)}" inputmode="numeric"></div>` : ""}
        ${err ? `<div class="text-danger meta">${Util.esc(err)}</div>` : ""}
        <div class="row-actions">
          <button class="cta ghost" data-action="cancel-add" data-kind="${kind}">× CANCEL</button>
          <button class="cta" data-action="save-add" data-kind="${kind}">→ SAVE</button>
