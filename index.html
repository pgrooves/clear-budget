  function bindSettingsEvents(s) {
    root.querySelectorAll("[data-action=close-settings]").forEach(el => {
      el.addEventListener("click", () => { settingsOpen = false; render(); });
    });
    root.querySelectorAll("[data-action=signout]").forEach(el => {
      el.addEventListener("click", () => {
        if (!confirm("SIGN OUT? YOU'LL NEED THE HOUSEHOLD CODE TO RETURN.")) return;
        DataService.clearHouseholdId();
        settingsOpen = false;
        setupState.step = "who"; setupState.mode = null; setupState.names = ["",""];
        setupState.generatedCode = ""; setupState.joinCode = ""; setupState.error = "";
        renderSetup();
      });
    });
    root.querySelectorAll("[data-action=copy-code]").forEach(el => {
      el.addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(el.dataset.code); const t=el.textContent; el.textContent="COPIED"; setTimeout(()=>{el.textContent=t;},1000); } catch (e) {}
      });
    });
    root.querySelectorAll("[data-action=edit-tithe]").forEach(el => {
      el.addEventListener("click", () => {
        titheEdit.open = true;
        titheEdit.value = String(BudgetEngine.tithePercent(s));
        formErrors.tithe = "";
        render();
      });
    });
    const titheInput = root.querySelector("#tithe-input");
    if (titheInput) titheInput.addEventListener("input", e => { titheEdit.value = e.target.value; });
    root.querySelectorAll("[data-action=cancel-tithe]").forEach(el => {
      el.addEventListener("click", () => { titheEdit.open = false; formErrors.tithe = ""; render(); });
    });
    root.querySelectorAll("[data-action=save-tithe]").forEach(el => {
      el.addEventListener("click", async () => {
        formErrors.tithe = "";
        const n = parseFloat(titheEdit.value);
        if (!isFinite(n) || n < 0 || n > 100) {
          formErrors.tithe = "ENTER A NUMBER 0-100";
          render();
          return;
        }
        try {
          await DataService.update({ "settings.tithePercent": n });
          titheEdit.open = false;
          render();
        } catch (e) { alert("COULDN'T SAVE"); console.warn(e); }
      });
    });
    root.querySelectorAll("[data-action=show-add]").forEach(el => {
      el.addEventListener("click", () => {
        const kind = el.dataset.kind;
        if (kind === "income") addForms.income = { label: "", amount: "", dueDateOfMonth: "1" };
        else if (kind === "bill") addForms.bill = { label: "", amount: "", dueDateOfMonth: "1" };
        else if (kind === "savings") addForms.savings = { label: "", amount: "", dueDateOfMonth: "1" };
        else if (kind === "spending") addForms.spending = { label: "", budgeted: "" };
        else if (kind === "card") addForms.card = { label: "" };
        render();
      });
    });
    root.querySelectorAll("[data-action=show-add-debt]").forEach(el => {
      el.addEventListener("click", () => {
        addForms.debt = { label: "", balance: "", minimumPayment: "", interestRate: "" };
        render();
      });
    });
    root.querySelectorAll("[data-action=add-form-input]").forEach(el => {
      el.addEventListener("input", e => {
        const kind = el.dataset.kind;
        const field = el.dataset.field;
        if (addForms[kind]) addForms[kind][field] = e.target.value;
      });
    });
    root.querySelectorAll("[data-action=cancel-add]").forEach(el => {
      el.addEventListener("click", () => {
        const k = el.dataset.kind;
        addForms[k] = null;
        formErrors["add_" + k] = "";
        render();
      });
    });
    root.querySelectorAll("[data-action=cancel-add-debt]").forEach(el => {
      el.addEventListener("click", () => {
        addForms.debt = null;
        formErrors.add_debt = "";
        render();
      });
    });
    root.querySelectorAll("[data-action=save-add]").forEach(el => {
      el.addEventListener("click", () => saveNewItem(el.dataset.kind, s));
    });
    root.querySelectorAll("[data-action=save-add-debt]").forEach(el => {
      el.addEventListener("click", () => saveNewDebt(s));
    });
    root.querySelectorAll("[data-action=link-choose]").forEach(el => {
      el.addEventListener("click", () => {
        const kind = el.dataset.kind;
        const v = el.dataset.v; // "yes" | "no"
        const f = addForms[kind];
        if (!f) return;
        f.linkChoice = v;
        if (kind === "debt") saveNewDebt(s);
        else saveNewItem(kind, s);
      });
    });
    root.querySelectorAll("[data-action=delete-item]").forEach(el => {
      el.addEventListener("click", () => deleteItem(el.dataset.kind, el.dataset.id, s));
    });
    root.querySelectorAll("[data-action=edit-item]").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.dataset.kind + "_" + el.dataset.id;
        editStates[key] = !editStates[key];
        render();
      });
    });
    bindEditFormEvents(s);
    root.querySelectorAll("[data-action=open-new-month]").forEach(el => {
      el.addEventListener("click", () => {
        newMonthOpen = true;
        newMonthChoices = {};
        render();
      });
    });
    root.querySelectorAll("[data-action=reset-open]").forEach(el => {
      el.addEventListener("click", () => { resetConfirmOpen = true; render(); });
    });
    root.querySelectorAll("[data-action=reset-cancel]").forEach(el => {
      el.addEventListener("click", () => { resetConfirmOpen = false; render(); });
    });
    root.querySelectorAll("[data-action=reset-confirm]").forEach(el => {
      el.addEventListener("click", () => resetHousehold(s));
    });
    root.querySelectorAll("[data-action=balance-edit-toggle]").forEach(el => {
      el.addEventListener("click", () => {
        const id = el.dataset.id;
        const bal = findBalance(s, id);
        if (balanceEdits[id] && balanceEdits[id].open) balanceEdits[id].open = false;
        else balanceEdits[id] = { open: true, value: bal ? String(bal.amount) : "" };
        render();
      });
    });
    (s.importProfiles || []).forEach(p => {
      const inp = root.querySelector(`#balance-input-${window.CSS && CSS.escape ? CSS.escape(p.id) : p.id}`);
      if (inp) inp.addEventListener("input", e => {
        if (balanceEdits[p.id]) balanceEdits[p.id].value = e.target.value;
      });
    });
    root.querySelectorAll("[data-action=balance-save]").forEach(el => {
      el.addEventListener("click", () => saveBalance(s, el.dataset.id));
    });
  }

  async function saveBalance(s, profileId) {
    const edit = balanceEdits[profileId];
    if (!edit) return;
    const n = parseFloat(String(edit.value).replace(/[^0-9.\-]/g, ""));
    if (!isFinite(n)) return;
    const today = Util.todayISO();
    const balances = (s.balances || []).filter(b => b.profileId !== profileId);
    balances.push({ profileId, amount: Math.round(n * 100) / 100, updatedDate: today });
    try {
      await DataService.update({ balances });
      balanceEdits[profileId].open = false;
      render();
    } catch (e) { alert("COULDN'T SAVE; CHECK CONNECTION"); console.warn(e); }
  }

  // Reset the household doc to seed data, KEEPING mode, names, tithePercent, debtStrategy,
  // and the same household code / doc ID. The snapshot listener re-renders both phones.
  async function resetHousehold(s) {
    const mode = s.settings && s.settings.mode ? s.settings.mode : "solo";
    const names = (s.settings && s.settings.names) ? s.settings.names.slice() : ["ME"];
    const fresh = buildDefaultData(mode, names);
    fresh.settings.tithePercent = BudgetEngine.tithePercent(s);
    fresh.settings.debtStrategy = BudgetEngine.debtStrategy(s);
    try {
      // Clear any transient UI state that could leak across the reset
      Object.keys(txnEdits).forEach(k => delete txnEdits[k]);
      Object.keys(editStates).forEach(k => delete editStates[k]);
      Object.keys(addForms).forEach(k => addForms[k] = null);
      Object.keys(formErrors).forEach(k => delete formErrors[k]);
      logForm.amount = ""; logForm.categoryId = null; logForm.categoryType = null;
      logForm.paymentType = "cash"; logForm.cardId = null; logForm.note = "";
      extraPreview = 0;
      resetConfirmOpen = false;
      await DataService.set(fresh);
      render();
    } catch (e) { alert("COULDN'T RESET; CHECK CONNECTION"); console.warn(e); resetConfirmOpen = true; render(); }
  }

  function bindEditFormEvents(s) {
    root.querySelectorAll("[data-action=cancel-edit]").forEach(el => {
      el.addEventListener("click", () => {
        editStates[el.dataset.kind + "_" + el.dataset.id] = false;
        render();
      });
    });
    root.querySelectorAll("[data-action=save-edit]").forEach(el => {
      el.addEventListener("click", () => saveEdit(el.dataset.kind, el.dataset.id, s));
    });
  }

  async function saveEdit(kind, id, s) {
    const form = root.querySelector(`[data-edit-form][data-kind="${kind}"][data-id="${id}"]`);
    if (!form) return;
    const values = {};
    form.querySelectorAll("[data-edit-field]").forEach(inp => { values[inp.dataset.editField] = inp.value; });
    const patch = {};
    if (kind === "income") {
      const arr = (s.income||[]).map(i => i.id === id ? {
        ...i,
        label: (values.label||i.label).toUpperCase(),
        amount: parseFloat(values.amount) || 0,
        dueDateOfMonth: parseInt(values.dueDateOfMonth,10) || 1
      } : i);
      patch.income = arr;
    } else if (kind === "bill" || kind === "savings") {
      const arr = (s.bills||[]).map(b => b.id === id ? {
        ...b,
        label: (values.label||b.label).toUpperCase(),
        amount: parseFloat(values.amount) || 0,
        dueDateOfMonth: parseInt(values.dueDateOfMonth,10) || 1
      } : b);
      patch.bills = arr;
    } else if (kind === "spending") {
      const arr = (s.spendingCategories||[]).map(c => c.id === id ? {
        ...c,
        label: (values.label||c.label).toUpperCase(),
        budgeted: parseFloat(values.budgeted) || 0
      } : c);
      patch.spendingCategories = arr;
    } else if (kind === "debt") {
      const arr = (s.debts||[]).map(d => {
        if (d.id !== id) return d;
        const newBal = parseFloat(values.balance);
        return {
          ...d,
          label: (values.label||d.label).toUpperCase(),
          balance: isFinite(newBal) ? newBal : d.balance,
          originalBalance: Number(d.originalBalance) || (isFinite(newBal) ? newBal : d.balance),
          minimumPayment: parseFloat(values.minimumPayment) || 0,
          interestRate: parseFloat(values.interestRate) || 0
        };
      });
      patch.debts = arr;
    } else if (kind === "card") {
      const arr = (s.creditCards||[]).map(c => c.id === id ? {
        ...c,
        label: (values.label||c.label).toUpperCase()
      } : c);
      patch.creditCards = arr;
    }
    try {
      await DataService.update(patch);
      editStates[kind + "_" + id] = false;
      render();
    } catch (e) { alert("COULDN'T SAVE"); console.warn(e); }
  }

  async function saveNewItem(kind, s) {
    formErrors["add_" + kind] = "";
    const f = addForms[kind] || {};
    const label = (f.label||"").trim();
    if (!label) { formErrors["add_" + kind] = "LABEL REQUIRED"; render(); return; }
    const patch = {};
    if (kind === "income") {
      const item = { id: Util.uuid(), label: label.toUpperCase(), amount: parseFloat(f.amount)||0, dueDateOfMonth: parseInt(f.dueDateOfMonth,10)||1 };
      patch.income = [...(s.income||[]), item];
    } else if (kind === "bill" || kind === "savings") {
      const item = { id: Util.uuid(), label: label.toUpperCase(), amount: parseFloat(f.amount)||0, dueDateOfMonth: parseInt(f.dueDateOfMonth,10)||1, category: kind };
      patch.bills = [...(s.bills||[]), item];
    } else if (kind === "spending") {
      const item = { id: Util.uuid(), label: label.toUpperCase(), budgeted: parseFloat(f.budgeted)||0, type: "spending" };
      patch.spendingCategories = [...(s.spendingCategories||[]), item];
    } else if (kind === "card") {
      // Card ↔ Debt fuzzy link confirm (mirror of the debt path).
      if (!f.linkChoice) {
        const match = (s.debts || []).find(d => fuzzyLabelMatch(d.label, label));
        if (match) {
          f.pendingMatch = { targetId: match.id, targetLabel: match.label };
          render();
          return;
        }
      }
      const linkDebtId = (f.linkChoice === "yes" && f.pendingMatch) ? f.pendingMatch.targetId : null;
      const item = { id: Util.uuid(), label: label.toUpperCase(), debtId: linkDebtId };
      patch.creditCards = [...(s.creditCards||[]), item];
      if (linkDebtId) {
        patch.debts = (s.debts || []).map(d => d.id === linkDebtId ? { ...d, cardId: item.id } : d);
      }
    }
    try {
      await DataService.update(patch);
      addForms[kind] = null;
      render();
    } catch (e) { alert("COULDN'T SAVE"); console.warn(e); }
  }

  async function deleteItem(kind, id, s) {
    if (!confirm("DELETE THIS ITEM?")) return;
    const patch = {};
    if (kind === "income") patch.income = (s.income||[]).filter(x => x.id !== id);
    else if (kind === "bill" || kind === "savings") patch.bills = (s.bills||[]).filter(x => x.id !== id);
    else if (kind === "spending") patch.spendingCategories = (s.spendingCategories||[]).filter(x => x.id !== id);
    else if (kind === "debt") {
      // Also clear cardId on any card that was linked to this debt.
      patch.debts = (s.debts||[]).filter(x => x.id !== id);
      patch.creditCards = (s.creditCards||[]).map(c => c.debtId === id ? { ...c, debtId: null } : c);
    }
    else if (kind === "card") {
      patch.creditCards = (s.creditCards||[]).filter(x => x.id !== id);
      // Clear cardId on any debt referencing this card.
      patch.debts = (s.debts||[]).map(d => d.cardId === id ? { ...d, cardId: null } : d);
    }
    try { await DataService.update(patch); render(); } catch (e) { alert("COULDN'T DELETE"); }
  }

  /* ------------- IMPORT PIPELINE ------------- */

  function resetImportFlow() {
    importFlow.open = false;
    importFlow.stage = null;
    importFlow.kind = null;
    importFlow.error = "";
    importFlow.rawText = "";
    importFlow.fileName = "";
    importFlow.csvHeaders = [];
    importFlow.csvRows = [];
    importFlow.pasteItems = [];
    importFlow.pasteStructure = null;
    importFlow.matchedProfile = null;
    importFlow.learn = {
      dateColumn: null, amountColumn: null, descriptionColumn: null,
      balanceIsAmount: false, hasBalancePrompt: false,
      label: "", paymentType: "cash", negativeIsPurchase: null,
      somethingsWrong: false,
      override: { amountPos: null, secondIsBalance: null, linesPerTxn: null }
    };
    importFlow.reviewRows = [];
    importFlow.showOlder = false;
    importFlow.choicePanelOpen = false;
    importFlow.autoMatchResult = null;
  }

  function openPasteOverlay() {
    resetImportFlow();
    importFlow.open = true;
    importFlow.stage = "paste-input";
    importFlow.kind = "paste";
    render();
  }

  function onCsvFilePicked(s, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      resetImportFlow();
      importFlow.open = true;
      importFlow.kind = "csv";
      importFlow.fileName = file.name || "IMPORT.CSV";
      const parsed = ImportEngine.csvParse(String(reader.result || ""));
      importFlow.csvHeaders = parsed.headers;
      importFlow.csvRows = parsed.rows;
      // Try to match an existing profile by fingerprint.
      const fp = ImportEngine.computeCsvFingerprint(parsed.headers);
      const profile = (s.importProfiles || []).find(p => p.profileType === "csv" && p.headerFingerprint === fp);
      if (profile) {
        importFlow.matchedProfile = profile;
        goToReviewFromCsv(s);
      } else {
        importFlow.stage = "learning";
        render();
      }
    };
    reader.onerror = () => {
      resetImportFlow();
      importFlow.open = true;
      importFlow.stage = "error";
      importFlow.error = "COULDN'T READ FILE";
      render();
    };
    reader.readAsText(file);
  }

  function onPasteSubmit(s) {
    const text = importFlow.rawText || "";
    const parsed = ImportEngine.textParse(text);
    if (!parsed.structure.hasDates) {
      importFlow.stage = "no-dates";
      render();
      return;
    }
    importFlow.pasteItems = parsed.items;
    importFlow.pasteStructure = parsed.structure;
    const fp = ImportEngine.computePasteFingerprint(parsed.structure);
    const profile = (s.importProfiles || []).find(p => p.profileType === "paste" && p.formatFingerprint === fp);
    if (profile) {
      importFlow.matchedProfile = profile;
      // Re-parse with the profile's saved overrides so recognized imports
      // apply the same corrections the user made the first time.
      if (profile.lineFormat) {
        const lf = profile.lineFormat;
        const rep = ImportEngine.textParse(text, {
          amountPos: (lf.amountPosition === "first" || lf.amountPosition === "last") ? lf.amountPosition : undefined,
          secondIsBalance: lf.secondIsBalance == null ? undefined : !!lf.secondIsBalance,
          linesPerTxn: lf.linesPerTransaction || undefined
        });
        importFlow.pasteItems = rep.items;
      }
      goToReviewFromPaste(s);
    } else {
      // Learn mode
      importFlow.learn.hasBalancePrompt = parsed.structure.hasBalance;
      // Auto-detect sign convention when unambiguous
      const signs = parsed.items.map(i => Math.sign(i.amount));
      if (signs.every(x => x >= 0)) importFlow.learn.negativeIsPurchase = false;
      else if (signs.every(x => x <= 0)) importFlow.learn.negativeIsPurchase = true;
      importFlow.stage = "learning";
      render();
    }
  }

  // Build review rows from CSV using either the matched profile or the learning-wizard picks.
  function goToReviewFromCsv(s) {
    const profile = importFlow.matchedProfile || {
      dateColumn: importFlow.learn.dateColumn,
      amountColumn: importFlow.learn.amountColumn,
      descriptionColumn: importFlow.learn.descriptionColumn,
      negativeIsPurchase: !!importFlow.learn.negativeIsPurchase,
      paymentType: importFlow.learn.paymentType,
      label: importFlow.learn.label
    };
    const items = [];
    for (const row of importFlow.csvRows) {
      if (!row || !row.length) continue;
      const dateRaw = row[profile.dateColumn] || "";
      const amtRaw = row[profile.amountColumn] || "";
      const desc = row[profile.descriptionColumn] || "";
      const iso = ImportEngine.parseDate(dateRaw);
      if (!iso) continue;
      const amtToks = ImportEngine.findAmounts(amtRaw) || [];
      const amount = amtToks.length ? amtToks[0].value : parseFloat(String(amtRaw).replace(/[^0-9.\-]/g, ""));
      if (!isFinite(amount)) continue;
      items.push({ date: iso, amount, description: desc });
    }
    buildReviewRows(s, items, profile);
  }

  function goToReviewFromPaste(s) {
    const profile = importFlow.matchedProfile || {
      profileType: "paste",
      negativeIsPurchase: !!importFlow.learn.negativeIsPurchase,
      paymentType: importFlow.learn.paymentType,
      label: importFlow.learn.label,
      formatFingerprint: ImportEngine.computePasteFingerprint(importFlow.pasteStructure)
    };
    buildReviewRows(s, importFlow.pasteItems, profile);
  }

  function buildReviewRows(s, items, profile) {
    const existing = s.transactions || [];
    const mmap = s.merchantMap || {};
    const rows = [];
    for (const it of items) {
      const signed = Number(it.amount) || 0;
      const isNeg = signed < 0;
      // With negativeIsPurchase: negative = purchase, positive = deposit.
      // Without: positive = purchase, negative = deposit/refund.
      const isDeposit = profile.negativeIsPurchase ? !isNeg : isNeg;
      const absAmt = Math.abs(signed);
      const merchantKey = ImportEngine.normalizeMerchantKey(it.description);
      const mappedCat = mmap[merchantKey] || null;
      // Prefer spending category ids; fall back gracefully.
      let categoryType = null;
      if (mappedCat) {
        const inSpending = (s.spendingCategories || []).some(c => c.id === mappedCat);
        const inBills = (s.bills || []).some(b => b.id === mappedCat);
        categoryType = inSpending ? "spending" : (inBills ? "bill" : "spending");
      }
      const cand = { date: it.date, amount: absAmt, description: it.description };
      let skipped = false, skipReason = "";
      if (isDeposit) { skipped = true; skipReason = "DEPOSIT; SKIPPED"; }
      if (!skipped && ImportEngine.isExactDupe(cand, existing)) {
        skipped = true;
        skipReason = "ALREADY LOGGED";
      }
      if (!skipped) {
        const fuzz = ImportEngine.findFuzzyMatch(cand, existing);
        if (fuzz) {
          skipped = true;
          const label = (fuzz.note || "MATCH").toUpperCase();
          skipReason = `MATCHES: ${label} · ${Util.fmtDateShort(fuzz.date)}`;
        }
      }
      rows.push({
        id: Util.uuid(),
        date: it.date,
        amount: absAmt,
        originalSigned: signed,
        description: (it.description || "").toUpperCase().slice(0, 60),
        merchantKey,
        categoryId: mappedCat,
        categoryType,
        categoryAuto: !!mappedCat,
        paymentType: profile.paymentType || "cash",
        cardId: null,
        person: (s.settings && s.settings.mode === "couple") ? "JOINT" : ((s.settings && s.settings.names && s.settings.names[0]) || "ME").toUpperCase(),
        isDeposit,
        skipped,
        skipReason
      });
    }
    importFlow.reviewRows = rows;
    importFlow.stage = "review";
    render();
  }

  // Finalize learning wizard, save profile to Firestore, then advance to review.
  async function finalizeLearningAndReview(s) {
    const l = importFlow.learn;
    const label = (l.label || "").trim().toUpperCase() || (importFlow.kind === "csv" ? "CSV IMPORT" : "PASTED IMPORT");
    if (importFlow.kind === "csv") {
      if (l.dateColumn == null || l.amountColumn == null || l.descriptionColumn == null) {
        importFlow.error = "MAP DATE, AMOUNT, AND DESCRIPTION COLUMNS";
        render();
        return;
      }
    }
    if (l.negativeIsPurchase == null) l.negativeIsPurchase = true;
    const profile = {
      id: Util.uuid(),
      label,
      profileType: importFlow.kind === "csv" ? "csv" : "paste",
      paymentType: l.paymentType || "cash",
      negativeIsPurchase: !!l.negativeIsPurchase
    };
    if (importFlow.kind === "csv") {
      profile.dateColumn = l.dateColumn;
      profile.amountColumn = l.amountColumn;
      profile.descriptionColumn = l.descriptionColumn;
      profile.headerFingerprint = ImportEngine.computeCsvFingerprint(importFlow.csvHeaders);
    } else {
      // Compose effective override values (user picks fall back to auto-detected).
      const auto = importFlow.pasteStructure;
      const ov = l.override || {};
      const legacyOverride = (ov.amountPos == null && l.balanceIsAmount) ? "last" : ov.amountPos;
      const effAmountPos = legacyOverride || auto.amountPos;
      const effSecond = ov.secondIsBalance == null ? true : !!ov.secondIsBalance;
      const effLines = ov.linesPerTxn || auto.linesPerTxn;
      profile.lineFormat = {
        datePosition: auto.datePos,
        amountPosition: effAmountPos,        // "first" | "last" — the user's effective choice
        amountPosAuto: auto.amountPos,        // preserved for debugging / migration
        dateFormat: "AUTO",
        linesPerTransaction: effLines,
        secondIsBalance: effSecond
      };
      // Fingerprint tracks the AUTO-detected shape so future pastes of the same
      // layout are recognized; profile.lineFormat carries the user's overrides.
      profile.formatFingerprint = ImportEngine.computePasteFingerprint(auto);
    }
    try {
      await DataService.update({ importProfiles: [...(s.importProfiles || []), profile] });
    } catch (e) {
      alert("COULDN'T SAVE PROFILE; CHECK CONNECTION"); console.warn(e); return;
    }
    importFlow.matchedProfile = profile;
    // Re-parse the pasted text with the user's final overrides so review shows the
    // corrected items (not the auto-parsed ones from the initial preview).
    if (importFlow.kind === "paste") {
      const reparsed = ImportEngine.textParse(importFlow.rawText, {
        amountPos: profile.lineFormat.amountPosition,
        secondIsBalance: profile.lineFormat.secondIsBalance,
        linesPerTxn: profile.lineFormat.linesPerTransaction
      });
      importFlow.pasteItems = reparsed.items;
    }
    if (importFlow.kind === "csv") goToReviewFromCsv(s);
    else goToReviewFromPaste(s);
  }

  // Called when the user taps → IMPORT ALL. If any non-skipped rows lack a
  // category, we open the three-choice panel instead of blocking. Once the user
  // resolves via AUTO-MATCH (if there are still leftovers), IMPORT-LATER, or
  // PICK-ONE-BY-ONE, we route to commitImportWrite.
  function commitImport(s) {
    const flow = importFlow;
    const uncategorized = flow.reviewRows.filter(r => !r.skipped && !r.categoryId);
    if (uncategorized.length) {
      importFlow.choicePanelOpen = true;
      importFlow.error = "";
      render();
      return;
    }
    commitImportWrite(s, { allowUncategorized: false });
  }

  // Fuzzy match between two normalized merchant keys (already single-token from
  // normalizeMerchantKey). Returns true on equality, prefix-containment, or a
  // shared leading 3+ character run.
  function fuzzyMerchantMatch(a, b) {
    if (!a || !b) return false;
    if (a === b) return true;
    if (a.startsWith(b) || b.startsWith(a)) return true;
    // Both keys are already leading-alphabetic tokens; share the first 3 chars?
    if (a.length >= 3 && b.length >= 3 && a.slice(0, 3) === b.slice(0, 3)) return true;
    return false;
  }

  // Bulk auto-match categories on the review rows. Mutates rows in place.
  // Tries: (1) exact merchantMap hit, (2) fuzzy vs merchantMap keys,
  // (3) fuzzy vs merchant keys extracted from already-categorized transactions.
  function bulkAutoMatchCategories(s, rows) {
    const mmap = s.merchantMap || {};
    const spending = s.spendingCategories || [];
    const catIds = new Set(spending.map(c => c.id));
    // Build a "learned" key→categoryId table from past categorized transactions.
    const learnedCount = {};
    for (const t of (s.transactions || [])) {
      if (!t.categoryId || !catIds.has(t.categoryId)) continue;
      const k = ImportEngine.normalizeMerchantKey(t.note || "");
      if (!k) continue;
      learnedCount[k] = learnedCount[k] || {};
      learnedCount[k][t.categoryId] = (learnedCount[k][t.categoryId] || 0) + 1;
    }
    const learned = {};
    for (const k in learnedCount) {
      let bestId = null, best = 0;
      for (const cid in learnedCount[k]) {
        if (learnedCount[k][cid] > best) { best = learnedCount[k][cid]; bestId = cid; }
      }
      if (bestId) learned[k] = bestId;
    }

    let matched = 0, total = 0;
    for (const r of rows) {
      if (r.skipped || r.categoryId) continue;
      total++;
      const k = r.merchantKey || "";
      if (!k) continue;
      // 1. Exact merchantMap hit
      if (mmap[k] && catIds.has(mmap[k])) {
        r.categoryId = mmap[k]; r.categoryType = "spending"; r.categoryAuto = true; matched++; continue;
      }
      // 2. Fuzzy merchantMap
      let hit = null;
      for (const stored in mmap) {
        if (!catIds.has(mmap[stored])) continue;
        if (fuzzyMerchantMatch(k, stored)) { hit = mmap[stored]; break; }
      }
      if (hit) {
        r.categoryId = hit; r.categoryType = "spending"; r.categoryAuto = true; matched++; continue;
      }
      // 3. Fuzzy against learned keys from past transactions
      for (const stored in learned) {
        if (fuzzyMerchantMatch(k, stored)) { hit = learned[stored]; break; }
      }
      if (hit) {
        r.categoryId = hit; r.categoryType = "spending"; r.categoryAuto = true; matched++;
      }
    }
    return { matched, total, remaining: total - matched };
  }

  async function commitImportWrite(s, opts) {
    opts = opts || {};
    const flow = importFlow;
    const newTxns = [];
    const mapUpdates = {};
    for (const r of flow.reviewRows) {
      if (r.skipped) continue;
      if (!r.categoryId && !opts.allowUncategorized) continue;
      const monthYM = String(r.date || "").slice(0, 7) || s.currentMonth;
      const txn = {
        id: r.id,
        date: r.date,
        amount: Math.round(r.amount * 100) / 100,
        categoryId: r.categoryId || "",
        categoryType: r.categoryType || "spending",
        note: (r.description || "").toUpperCase().slice(0, 60),
        paymentType: r.paymentType,
        person: r.person,
        month: monthYM,
        cardId: r.paymentType === "credit" ? (r.cardId || null) : null,
        source: "import"
      };
      if (r.merchantKey) txn.merchantKey = r.merchantKey;
      if (!r.categoryId) txn.needsCategory = true;
      newTxns.push(txn);
      if (r.merchantKey && r.categoryId) mapUpdates[r.merchantKey] = r.categoryId;
    }
    if (!newTxns.length) {
      importFlow.error = "NO TRANSACTIONS TO IMPORT";
      render();
      return;
    }
    const patch = {
      transactions: [...(s.transactions || []), ...newTxns]
    };
    if (Object.keys(mapUpdates).length) {
      patch.merchantMap = { ...(s.merchantMap || {}), ...mapUpdates };
    }
    try {
      await DataService.update(patch);
      // Compute how many of the imported rows landed outside the current month
      // so the LOG screen can flag it. Off-month rows are valid but won't
      // show in THIS MONTH — this was invisible in V8, hence the notice.
      const cm = s.currentMonth;
      const offMonth = newTxns.filter(t => (t.month || "").slice(0, 7) !== cm).length;
      postImportNotice = { total: newTxns.length, offMonth, dismissed: false };
      resetImportFlow();
      importMenuOpen = false;
      currentTab = "log";
      render();
    } catch (e) { alert("COULDN'T IMPORT; CHECK CONNECTION"); console.warn(e); }
  }

  function renderImportOverlay(s) {
    const stage = importFlow.stage;
    const overlay = document.createElement("div");
    overlay.className = "overlay";
    let inner = "";
    if (stage === "paste-input") inner = renderPasteInput();
    else if (stage === "no-dates") inner = renderNoDates();
    else if (stage === "error") inner = renderImportError();
    else if (stage === "learning") inner = renderLearning(s);
    else if (stage === "review") inner = renderReview(s);
    overlay.innerHTML = `<div class="overlay-inner">${inner}</div>`;
    document.body.appendChild(overlay);
    bindImportOverlay(s, overlay);
  }

  function renderLearning(s) {
    if (importFlow.kind === "csv") return renderLearningCsv(s);
    return renderLearningPaste(s);
  }

  function renderLearningCsv(s) {
    const l = importFlow.learn;
    const headers = importFlow.csvHeaders;
    const sampleRows = importFlow.csvRows.slice(0, 3);
    const roleOf = (i) => {
      if (l.dateColumn === i) return "picked date";
      if (l.amountColumn === i) return "picked amount";
      if (l.descriptionColumn === i) return "picked description";
      return "";
    };
    const headerCells = headers.map((h, i) => {
      const dot = (role) => (l[role+"Column"] === i ? "* " : "");
      return `<th>
        <div>${Util.esc(h || `COL ${i+1}`)}</div>

    const rowsHtml = sampleRows.map(r => `<tr>${r.map(c => `<td>${Util.esc(c)}</td>`).join("")}</tr>`).join("");
    return `

  }

  function renderLearningPaste(s) {
    const l = importFlow.learn;
    const items = importFlow.pasteItems.slice(0, 3);
    const previewHtml = items.map(it => `
      <div class="preview-txn">
        <div class="d">${Util.esc(Util.fmtDateShort(it.date))}</div>
        <div class="desc">${Util.esc(it.description)}</div>

    const balanceQ = (l.hasBalancePrompt && !l.somethingsWrong) ? `

        <button class="toggle ${l.balanceIsAmount===true?'active':''}" data-action="learn-balance" data-v="amount">NO; IT'S THE AMOUNT</button>

    // Show negative-is-purchase only when the paste is ambiguous (mixed signs).
    const signQ = l.negativeIsPurchase == null ? `

      <div class="toggle-row">
        <button class="toggle ${l.negativeIsPurchase===true?'active':''}" data-action="learn-sign" data-v="yes">YES</button>
        <button class="toggle ${l.negativeIsPurchase===false?'active':''}" data-action="learn-sign" data-v="no">NO</button>
      </div>
    ` : "";
    // Effective override values displayed on the re-parse controls.
    const ov = l.override || {};
    const auto = importFlow.pasteStructure || { amountPos: "first", linesPerTxn: 1 };
    const effAmountPos = ov.amountPos || auto.amountPos;
    const effSecondBal = ov.secondIsBalance == null ? true : !!ov.secondIsBalance;
    const effLines = ov.linesPerTxn || auto.linesPerTxn;
    const wrongPanel = l.somethingsWrong ? `
      <div class="overlay-sub" style="margin-top:24px;">AMOUNT IS THE</div>
      <div class="toggle-row">
        <button class="toggle ${effAmountPos==='first'?'active':''}" data-action="reparse-amt" data-v="first">FIRST NUMBER</button>
        <button class="toggle ${effAmountPos==='last'?'active':''}" data-action="reparse-amt" data-v="last">LAST NUMBER</button>
      </div>
      <div class="overlay-sub" style="margin-top:16px;">SECOND NUMBER IS A RUNNING BALANCE</div>
      <div class="toggle-row">
        <button class="toggle ${effSecondBal===true?'active':''}" data-action="reparse-sec" data-v="yes">YES</button>
        <button class="toggle ${effSecondBal===false?'active':''}" data-action="reparse-sec" data-v="no">NO</button>
      </div>
      <div class="overlay-sub" style="margin-top:16px;">LINES PER TRANSACTION</div>
      <div class="toggle-row">
        <button class="toggle ${effLines===1?'active':''}" data-action="reparse-lpt" data-v="1">1</button>
        <button class="toggle ${effLines===2?'active':''}" data-action="reparse-lpt" data-v="2">2</button>
        <button class="toggle ${effLines===3?'active':''}" data-action="reparse-lpt" data-v="3">3</button>
      </div>
      <button class="cta ghost" style="margin-top:12px;" data-action="reparse-preview">→ RE-PREVIEW</button>
    ` : "";
    return `
      <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:8px;">
        <div class="overlay-title">→ NEW ACCOUNT</div>
        <button class="link" data-action="import-cancel">× CLOSE</button>
      </div>
      <div class="overlay-sub">HERE'S WHAT WE FOUND; DOES THIS LOOK RIGHT?</div>
      <div style="margin-top:12px;">${previewHtml || `<div class="meta">NO TRANSACTIONS DETECTED</div>`}</div>
      <div class="toggle-row" style="margin-top:12px;">
        <button class="toggle ${l.somethingsWrong?'':'active'}" data-action="paste-looks-right">LOOKS RIGHT</button>
        <button class="toggle ${l.somethingsWrong?'active':''}" data-action="paste-somethings-wrong">× SOMETHING'S WRONG</button>
      </div>
      ${wrongPanel}
      ${balanceQ}
      ${signQ}
      ${renderAccountInfoBlock()}
      ${importFlow.error ? `<div class="text-danger meta" style="margin-top:12px;">${Util.esc(importFlow.error)}</div>` : ""}
      <button class="cta" style="margin-top:24px;" data-action="learning-continue">→ CONTINUE</button>
    `;
  }

  function renderAccountInfoBlock() {
    const l = importFlow.learn;
    return `
      <div class="overlay-sub" style="margin-top:24px;">WHAT SHOULD WE CALL THIS ACCOUNT?</div>
      <input class="underline" style="margin-top:8px;" id="learn-label" value="${Util.esc(l.label)}" placeholder="CHASE CHECKING" maxlength="24">
      <div class="overlay-sub" style="margin-top:24px;">IS THIS A CREDIT CARD OR CASH / DEBIT ACCOUNT?</div>
      <div class="toggle-row">
        <button class="toggle ${l.paymentType==='cash'?'active':''}" data-action="learn-pay" data-v="cash">CASH / DEBIT</button>
        <button class="toggle ${l.paymentType==='credit'?'active':''}" data-action="learn-pay" data-v="credit">CREDIT</button>
      </div>
    `;
  }

  function renderReview(s) {
    const isCouple = s.settings && s.settings.mode === "couple";
    const currentMonth = s.currentMonth;
    const allRows = importFlow.reviewRows;
    const spendingCats = s.spendingCategories || [];
    const cards = s.creditCards || [];
    const shown = importFlow.showOlder ? allRows : allRows.filter(r => r.date.slice(0,7) >= currentMonth);
    const olderCount = allRows.length - shown.length;
    const label = importFlow.matchedProfile ? importFlow.matchedProfile.label : (importFlow.learn.label || "IMPORT");
    const recognized = !!importFlow.matchedProfile && !importFlow.stageWasLearning;
    const rowsHtml = shown.map(r => renderReviewRow(r, spendingCats, cards, isCouple, s)).join("") ||
      `<div class="meta" style="padding:16px;">NO TRANSACTIONS IN THE CURRENT MONTH</div>`;
    const importable = allRows.filter(r => !r.skipped).length;
    const uncatCount = allRows.filter(r => !r.skipped && !r.categoryId).length;
    const autoRes = importFlow.autoMatchResult;
    // Off-month breakdown BEFORE import, so nothing vanishes silently.
    const monthBuckets = {};
    for (const r of allRows) {
      if (r.skipped) continue;
      const ym = (r.date || "").slice(0, 7);
      if (!ym) continue;
      if (ym === s.currentMonth) continue;
      monthBuckets[ym] = (monthBuckets[ym] || 0) + 1;
    }
    const offMonthHtml = Object.keys(monthBuckets).length ? `
      <div class="text-danger meta" style="margin-top:8px;">
        ${Object.keys(monthBuckets).sort().map(ym => `${monthBuckets[ym]} ROW${monthBuckets[ym]===1?'':'S'} DATED ${Util.esc(Util.fmtMonthLong(ym))}`).join(" · ")}
      </div>
    ` : "";
    const choicePanel = importFlow.choicePanelOpen ? `
      <div class="settings-group" style="margin-top:16px; background: var(--gray-light);">
        <h3 class="text-danger">${uncatCount} OF ${importable} ROWS HAVE NO CATEGORY</h3>
        ${autoRes ? `<div class="meta" style="margin-bottom:12px;">MATCHED ${autoRes.matched} OF ${autoRes.total}${autoRes.remaining>0 ? `; ${autoRes.remaining} STILL NEED CATEGORIES` : ""}</div>` : ""}
        <div style="display:flex; flex-direction:column; gap:8px;">
          <button class="cta ghost" data-action="import-auto-match">→ AUTO-MATCH CATEGORIES</button>
          <button class="cta ghost" data-action="import-later">→ IMPORT; ASSIGN LATER</button>
          <button class="cta ghost" data-action="import-pick-one-by-one">→ PICK ONE BY ONE</button>
        </div>
      </div>
    ` : "";
    return `
      <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:8px;">
        <div class="overlay-title">→ REVIEW IMPORT</div>
        <button class="link" data-action="import-cancel">× CLOSE</button>
      </div>
      <div class="overlay-sub">${recognized ? "RECOGNIZED: " : ""}${Util.esc(label)}</div>
      <div class="overlay-sub" style="opacity:0.7;">${importable} OF ${allRows.length} WILL BE IMPORTED${uncatCount ? ` · ${uncatCount} NEED CATEGORIES` : ""}</div>
      ${offMonthHtml}
      <div style="margin-top:16px;">${rowsHtml}</div>
      ${olderCount > 0 || importFlow.showOlder ? `
        <button class="link" style="margin-top:16px;" data-action="toggle-older">${importFlow.showOlder ? "× HIDE OLDER" : `→ SHOW OLDER TRANSACTIONS (${olderCount})`}</button>
      ` : ""}
      ${importFlow.error ? `<div class="text-danger meta" style="margin-top:12px;">${Util.esc(importFlow.error)}</div>` : ""}
      ${choicePanel}
      <button class="cta" style="margin-top:24px;" data-action="import-commit">→ IMPORT ALL</button>
    `;
  }

  function renderReviewRow(r, spendingCats, cards, isCouple, s) {
    const needsCategory = !r.skipped && !r.categoryId;
    const chips = spendingCats.map(c => `
      <button class="review-cat-chip ${r.categoryId===c.id?'active':''}" data-action="review-cat" data-id="${Util.esc(r.id)}" data-cat="${Util.esc(c.id)}">
        ${Util.esc(c.label)}${(r.categoryAuto && r.categoryId===c.id) ? `<span class="auto">AUTO</span>` : ""}
      </button>
    `).join("");
    const catLabelHtml = needsCategory
      ? `<div class="review-cat-label needs">× PICK A CATEGORY</div>`
      : (r.skipped ? "" : `<div class="review-cat-label">CATEGORY</div>`);
    const personChips = isCouple ? `
      <div class="review-cat-chips" style="margin-top:6px;">
        ${[s.settings.names[0], s.settings.names[1], "JOINT"].map(p => {
          const val = p.toUpperCase();
          return `<button class="review-cat-chip ${r.person===val?'active':''}" data-action="review-person" data-id="${Util.esc(r.id)}" data-p="${Util.esc(val)}">${Util.esc(p)}</button>`;
        }).join("")}
      </div>
    ` : "";
    const cardChips = r.paymentType === "credit" && cards.length ? `
      <div class="review-cat-chips" style="margin-top:6px;">
        ${cards.map(c => `<button class="review-cat-chip ${r.cardId===c.id?'active':''}" data-action="review-card" data-id="${Util.esc(r.id)}" data-c="${Util.esc(c.id)}">${Util.esc(c.label)}</button>`).join("")}
        ${r.cardId ? `<button class="review-cat-chip" data-action="review-card" data-id="${Util.esc(r.id)}" data-c="">× NONE</button>` : ""}
      </div>
    ` : "";
    return `
      <div class="review-row ${r.skipped ? 'skipped' : ''} ${needsCategory ? 'needs-category' : ''}">
        <div class="review-row-line">
          <div class="d">${Util.esc(Util.fmtDateShort(r.date))}</div>
          <div class="desc">${Util.esc(r.description)}</div>
          <div class="a">${r.isDeposit ? "+" : "-"}${Util.esc(Util.fmtMoney(r.amount, 2).replace(/^-\$/, "$"))}</div>
        </div>
        ${catLabelHtml}
        <div class="review-cat-chips">${chips || `<div class="meta">NO SPENDING CATEGORIES</div>`}</div>
        ${personChips}
        <div class="review-controls">
          <button class="toggle ${r.paymentType==='cash'?'active':''}" data-action="review-pay" data-id="${Util.esc(r.id)}" data-v="cash">CASH</button>
          <button class="toggle ${r.paymentType==='credit'?'active':''}" data-action="review-pay" data-id="${Util.esc(r.id)}" data-v="credit">CREDIT</button>
          ${r.skipped
            ? `<button class="unskip-btn" data-action="review-skip" data-id="${Util.esc(r.id)}" data-v="off">→ UN-SKIP</button>`
            : `<button class="skip-btn" data-action="review-skip" data-id="${Util.esc(r.id)}" data-v="on">× SKIP</button>`}
        </div>
        ${cardChips}
        ${r.skipped && r.skipReason ? `<div class="review-skip-reason">${Util.esc(r.skipReason)}</div>` : ""}
      </div>
    `;
  }

  function bindImportOverlay(s, overlay) {
    const q = sel => overlay.querySelectorAll(sel);
    q("[data-action=import-cancel]").forEach(el => el.addEventListener("click", () => {
      resetImportFlow();
      overlay.remove();
      render();
    }));
    const ta = overlay.querySelector("#paste-input");
    if (ta) ta.addEventListener("input", e => { importFlow.rawText = e.target.value; });
    q("[data-action=paste-parse]").forEach(el => el.addEventListener("click", () => {
      overlay.remove();
      onPasteSubmit(s);
    }));
    q("[data-action=csv-pick-col]").forEach(el => el.addEventListener("click", () => {
      const i = parseInt(el.dataset.i, 10);
      const role = el.dataset.role;
      if (role === "date") importFlow.learn.dateColumn = i;
      else if (role === "amount") importFlow.learn.amountColumn = i;
      else if (role === "description") importFlow.learn.descriptionColumn = i;
      overlay.remove(); render();
    }));
    q("[data-action=paste-looks-right]").forEach(el => el.addEventListener("click", () => {
      // Collapse the re-parse panel; the user is satisfied with the current preview.
      importFlow.learn.somethingsWrong = false;
      overlay.remove(); render();
    }));
    q("[data-action=paste-somethings-wrong]").forEach(el => el.addEventListener("click", () => {
      // Reveal inline re-parse controls; do NOT commit best-guess to review yet.
      importFlow.learn.somethingsWrong = true;
      importFlow.error = "";
      // Seed override defaults from the auto-detected structure so the toggles
      // show the current state rather than blanks.
      const auto = importFlow.pasteStructure || {};
      const ov = importFlow.learn.override || {};
      if (ov.amountPos == null) ov.amountPos = auto.amountPos || "first";
      if (ov.secondIsBalance == null) ov.secondIsBalance = true;
      if (ov.linesPerTxn == null) ov.linesPerTxn = auto.linesPerTxn || 1;
      importFlow.learn.override = ov;
      overlay.remove(); render();
    }));
    q("[data-action=reparse-amt]").forEach(el => el.addEventListener("click", () => {
      const ov = importFlow.learn.override; ov.amountPos = el.dataset.v;
      overlay.remove(); render();
    }));
    q("[data-action=reparse-sec]").forEach(el => el.addEventListener("click", () => {
      const ov = importFlow.learn.override; ov.secondIsBalance = (el.dataset.v === "yes");
      overlay.remove(); render();
    }));
    q("[data-action=reparse-lpt]").forEach(el => el.addEventListener("click", () => {
      const ov = importFlow.learn.override; ov.linesPerTxn = parseInt(el.dataset.v, 10) || 1;
      overlay.remove(); render();
    }));
    q("[data-action=reparse-preview]").forEach(el => el.addEventListener("click", () => {
      // Re-run textParse with the current overrides and refresh preview.
      const ov = importFlow.learn.override || {};
      const rep = ImportEngine.textParse(importFlow.rawText, {
        amountPos: ov.amountPos || undefined,
        secondIsBalance: ov.secondIsBalance == null ? undefined : ov.secondIsBalance,
        linesPerTxn: ov.linesPerTxn || undefined
      });
      importFlow.pasteItems = rep.items;
      // Structure stays auto-detected (fingerprint stability); do not overwrite it.
      overlay.remove(); render();
    }));
    q("[data-action=learn-balance]").forEach(el => el.addEventListener("click", () => {
      // Legacy question kept when NOT in the SOMETHING'S WRONG panel.
      const isAmount = el.dataset.v === "amount";
      importFlow.learn.balanceIsAmount = isAmount;
      // Also mirror into override.amountPos so downstream consumers see one truth.
      importFlow.learn.override.amountPos = isAmount ? "last" : "first";
      overlay.remove(); render();
    }));
    q("[data-action=learn-sign]").forEach(el => el.addEventListener("click", () => {
      importFlow.learn.negativeIsPurchase = (el.dataset.v === "yes");
      overlay.remove(); render();
    }));
    q("[data-action=learn-pay]").forEach(el => el.addEventListener("click", () => {
      importFlow.learn.paymentType = el.dataset.v;
      overlay.remove(); render();
    }));
    const labelInput = overlay.querySelector("#learn-label");
    if (labelInput) labelInput.addEventListener("input", e => { importFlow.learn.label = e.target.value; });
    q("[data-action=learning-continue]").forEach(el => el.addEventListener("click", () => {
      importFlow.error = "";
      // Read the label from the input at commit time so we don't drop keystrokes.
      const li = overlay.querySelector("#learn-label");
      if (li) importFlow.learn.label = li.value;
      overlay.remove();
      finalizeLearningAndReview(s);
    }));
    q("[data-action=toggle-older]").forEach(el => el.addEventListener("click", () => {
      importFlow.showOlder = !importFlow.showOlder;
      overlay.remove(); render();
    }));
    q("[data-action=review-cat]").forEach(el => el.addEventListener("click", () => {
      const r = importFlow.reviewRows.find(x => x.id === el.dataset.id);
      if (!r) return;
      r.categoryId = el.dataset.cat;
      r.categoryType = "spending";
      r.categoryAuto = false; // user chose it now
      // Once no row is missing a category, drop the block banner.
      if (importFlow.error && !importFlow.reviewRows.some(x => !x.skipped && !x.categoryId)) importFlow.error = "";
      overlay.remove(); render();
    }));
    q("[data-action=review-person]").forEach(el => el.addEventListener("click", () => {
      const r = importFlow.reviewRows.find(x => x.id === el.dataset.id);
      if (!r) return;
      r.person = el.dataset.p;
      overlay.remove(); render();
    }));
    q("[data-action=review-card]").forEach(el => el.addEventListener("click", () => {
      const r = importFlow.reviewRows.find(x => x.id === el.dataset.id);
      if (!r) return;
      r.cardId = el.dataset.c || null;
      overlay.remove(); render();
    }));
    q("[data-action=review-pay]").forEach(el => el.addEventListener("click", () => {
      const r = importFlow.reviewRows.find(x => x.id === el.dataset.id);
      if (!r) return;
      r.paymentType = el.dataset.v;
      if (r.paymentType !== "credit") r.cardId = null;
      overlay.remove(); render();
    }));
    q("[data-action=review-skip]").forEach(el => el.addEventListener("click", () => {
      const r = importFlow.reviewRows.find(x => x.id === el.dataset.id);
      if (!r) return;
      if (el.dataset.v === "off") { r.skipped = false; r.skipReason = ""; }
      else { r.skipped = true; r.skipReason = r.skipReason || "SKIPPED"; }
      if (importFlow.error && !importFlow.reviewRows.some(x => !x.skipped && !x.categoryId)) importFlow.error = "";
      overlay.remove(); render();
    }));
    q("[data-action=import-commit]").forEach(el => el.addEventListener("click", () => {
      overlay.remove();
      commitImport(s);
    }));
    q("[data-action=import-auto-match]").forEach(el => el.addEventListener("click", () => {
      const result = bulkAutoMatchCategories(s, importFlow.reviewRows);
      importFlow.autoMatchResult = result;
      // If everything is now categorized, we can commit straight through; else
      // keep the panel visible so the user can pick IMPORT-LATER or PICK-ONE.
      if (result.remaining === 0) {
        importFlow.choicePanelOpen = false;
        overlay.remove();
        commitImportWrite(s, { allowUncategorized: false });
        return;
      }
      overlay.remove(); render();
    }));
    q("[data-action=import-later]").forEach(el => el.addEventListener("click", () => {
      importFlow.choicePanelOpen = false;
      overlay.remove();
      commitImportWrite(s, { allowUncategorized: true });
    }));
    q("[data-action=import-pick-one-by-one]").forEach(el => el.addEventListener("click", () => {
      importFlow.choicePanelOpen = false;
      importFlow.autoMatchResult = null;
      overlay.remove(); render();
    }));
  }

  /* ------------- NEW MONTH OVERLAY (only allowed modal) ------------- */
  function renderNewMonthOverlay(s) {
    const cats = (s.spendingCategories||[]);
    const rows = cats.map(c => {
      const remaining = BudgetEngine.categoryRemaining(s, c);
      const choice = newMonthChoices[c.id] || "roll";
      return `
        <div class="rollover-row">
          <h4>${Util.esc(c.label)}</h4>
          <div class="amt">${Util.esc(Util.fmtMoney(remaining,0))} UNSPENT</div>
          <div class="choice-row">
            <button class="${choice==='roll'?'active':''}" data-action="nm-choice" data-id="${Util.esc(c.id)}" data-choice="roll">ROLL OVER →</button>
            <button class="${choice==='reset'?'active':''}" data-action="nm-choice" data-id="${Util.esc(c.id)}" data-choice="reset">RESET TO $0</button>
          </div>
        </div>`;
    }).join("");

    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerHTML = `
      <div class="overlay-inner">
        <button class="link" data-action="nm-cancel">× CLOSE</button>
        <h2 class="section-label" style="margin-top:16px;">→ NEW MONTH</h2>
        <div class="meta" style="margin-top:8px;">CURRENT: ${Util.esc(Util.fmtMonthLong(s.currentMonth))} · NEXT: ${Util.esc(Util.fmtMonthLong(nextMonth(s.currentMonth)))}</div>
        <div style="margin-top:24px;">${rows || `<div class="meta">NO SPENDING CATEGORIES</div>`}</div>
        <button class="cta big" style="margin-top:24px;" data-action="nm-confirm">→ CONFIRM NEW MONTH</button>
      </div>`;
    document.body.appendChild(overlay);

    overlay.querySelectorAll("[data-action=nm-choice]").forEach(el => {
      el.addEventListener("click", () => {
        newMonthChoices[el.dataset.id] = el.dataset.choice;
        // Re-render overlay only (remove existing and re-add)
        overlay.remove();
        renderNewMonthOverlay(s);
      });
    });
    overlay.querySelector("[data-action=nm-cancel]").addEventListener("click", () => {
      newMonthOpen = false; overlay.remove(); render();
    });
    overlay.querySelector("[data-action=nm-confirm]").addEventListener("click", () => confirmNewMonth(s, overlay));
  }

  function nextMonth(ym) {
    let [y, m] = ym.split("-").map(Number);
    m++;
    if (m > 12) { m = 1; y++; }
    return `${y}-${String(m).padStart(2,"0")}`;
  }

  async function confirmNewMonth(s, overlay) {
    const newMonth = nextMonth(s.currentMonth);
    const rollovers = {};
    (s.spendingCategories||[]).forEach(c => {
      const choice = newMonthChoices[c.id] || "roll";
      if (choice === "roll") {
        const remaining = BudgetEngine.categoryRemaining(s, c);
        if (remaining > 0) rollovers[c.id] = Math.round(remaining * 100) / 100;
      }
    });
    const patch = {};
    const mr = Object.assign({}, s.monthlyRollover || {});
    mr[newMonth] = rollovers;
    patch.monthlyRollover = mr;
    patch.currentMonth = newMonth;
    try {
      await DataService.update(patch);
      newMonthOpen = false;
      newMonthChoices = {};
      overlay.remove();
      render();
    } catch (e) { alert("COULDN'T UPDATE"); console.warn(e); }
  }

  /* ------------- GLOBAL EVENTS ------------- */
  function bindGlobalTabs() {
    root.querySelectorAll(".tab").forEach(el => {
      el.addEventListener("click", () => { currentTab = el.dataset.tab; settingsOpen = false; render(); });
    });
    root.querySelectorAll("[data-action=open-settings]").forEach(el => {
      el.addEventListener("click", () => { settingsOpen = true; render(); });
    });
  }

  return { render, renderLoading };
})();

/* ============================================================
   BOOT
   ============================================================ */
(function boot() {
  DataService.onData(() => UI.render());
  DataService.onError(() => {
    // If we've never received data and we can't reach Firestore,
    // fall back gracefully — if there's no household ID, show setup.
    if (!DataService.get() && !DataService.getHouseholdId()) {
      UI.render();
    }
  });

  const existing = DataService.getHouseholdId();
  if (existing) {
    UI.renderLoading("SYNCING...");
    if (db) {
      DataService.subscribe(existing);
      // Safety: if we don't receive data within 6s, keep loading screen but still allow reset
    } else {
      UI.renderLoading("OFFLINE; CAN'T REACH SYNC");
    }
  } else {
    UI.render(); // renders setup
  }
})();
</script>
</body>
</html>
