<div id="root"></div>
<script>
"use strict";

/* ============================================================
   FIREBASE INIT
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyCDpGVE4RUazjzwPasC73VOcUtRnvMZwXA",
  authDomain: "budget-app-dfc07.firebaseapp.com",
  projectId: "budget-app-dfc07",
  storageBucket: "budget-app-dfc07.firebasestorage.app",
  messagingSenderId: "100349315850",
  appId: "1:100349315850:web:a8406745705a9c682308f3"
};

let db = null;
try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
} catch (e) {
  console.warn("firebase init failed", e);
}

/* ============================================================
   UTIL
   ============================================================ */
const Util = (() => {
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => (
      { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]
    ));
  }
  function fmtMoney(n, decimals) {
    decimals = decimals || 0;
    if (!isFinite(n)) n = 0;
    const neg = n < 0;
    const abs = Math.abs(n);
    const s = abs.toLocaleString("en-US", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    return (neg ? "-$" : "$") + s;
  }
  function fmtMonthShort(ym) {
    if (!ym) return "";
    const [y, m] = ym.split("-").map(Number);
    const names = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    return `${names[m-1]} ${y}`;
  }
  function fmtMonthLong(ym) {
    if (!ym) return "";
    const [y, m] = ym.split("-").map(Number);
    const names = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
    return `${names[m-1]} ${y}`;
  }
  function fmtDateShort(iso) {
    if (!iso) return "";
    const d = new Date(iso + "T00:00:00");
    if (isNaN(d)) return iso;
    const names = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    return `${names[d.getMonth()]} ${d.getDate()}`;
  }
  function todayISO() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }
  function currentMonthYM() {
    return todayISO().slice(0,7);
  }
  function uuid() {
    return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 9);
  }
  return { esc, fmtMoney, fmtMonthShort, fmtMonthLong, fmtDateShort, todayISO, currentMonthYM, uuid };
})();

/* ============================================================
   DATA SERVICE
   Firestore + localStorage household code
   ============================================================ */
const DataService = (() => {
  const HOUSEHOLD_KEY = "clear_household_id";
  let unsub = null;
  let currentDoc = null;
  let currentId = null;
  const dataListeners = [];
  const errorListeners = [];

  function generateCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let s = "";
    for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
    return s;
  }
  function getHouseholdId() {
    try { return localStorage.getItem(HOUSEHOLD_KEY); } catch (e) { return null; }
  }
  function setHouseholdIdLocal(id) {
    try { localStorage.setItem(HOUSEHOLD_KEY, id); } catch (e) {}
    currentId = id;
  }
  function clearHouseholdId() {
    try { localStorage.removeItem(HOUSEHOLD_KEY); } catch (e) {}
    if (unsub) { try { unsub(); } catch (e) {} unsub = null; }
    currentDoc = null;
    currentId = null;
  }
  function onData(fn) { dataListeners.push(fn); }
  function onError(fn) { errorListeners.push(fn); }
  function emit(doc) { dataListeners.forEach(f => { try { f(doc); } catch (e) { console.warn(e); } }); }
  function emitErr(e) { errorListeners.forEach(f => { try { f(e); } catch (er) { console.warn(er); } }); }

  function subscribe(id) {
    if (!db) { emitErr(new Error("firestore unavailable")); return; }
    if (unsub) { try { unsub(); } catch (e) {} }
    currentId = id;
    try {
      unsub = db.collection("households").doc(id).onSnapshot(
        snap => {
          currentDoc = snap && snap.exists ? snap.data() : null;
          emit(currentDoc);
        },
        err => {
          console.warn("snapshot error", err);
          emitErr(err);
        }
      );
    } catch (e) {
      console.warn("subscribe threw", e);
      emitErr(e);
    }
  }

  function get() { return currentDoc; }
  function getId() { return currentId; }

  function set(data) {
    if (!db || !currentId) return Promise.reject(new Error("no household"));
    return db.collection("households").doc(currentId).set(data);
  }
  function update(patch) {
    if (!db || !currentId) return Promise.reject(new Error("no household"));
    return db.collection("households").doc(currentId).update(patch);
  }
  async function checkExists(id) {
    if (!db) throw new Error("firestore unavailable");
    const snap = await db.collection("households").doc(id).get();
    return snap.exists;
  }

  return {
    generateCode, getHouseholdId, setHouseholdIdLocal, clearHouseholdId,
    subscribe, onData, onError, get, getId, set, update, checkExists
  };
})();

/* ============================================================
   BUDGET ENGINE — pure functions, no DOM
   ============================================================ */
const BudgetEngine = (() => {
  const num = v => (isFinite(Number(v)) ? Number(v) : 0);

  function totalIncome(s) {
    return (s.income || []).reduce((a, i) => a + num(i.amount), 0);
  }
  function tithePercent(s) {
    return num(s.settings && s.settings.tithePercent != null ? s.settings.tithePercent : 10);
  }
  function tithe(s) {
    return totalIncome(s) * tithePercent(s) / 100;
  }
  function billsSubtotal(s) {
    return (s.bills || []).reduce((a, b) => a + num(b.amount), 0);
  }
  // Sum of stored bills only. Tithe is a display-only locked line and is
  // subtracted separately in safeToSpend / extraForDebt as the FIRST allocation from income.
  function totalBills(s) {
    return billsSubtotal(s);
  }
  function totalDebtMins(s) {
    return (s.debts || []).reduce((a, d) => a + num(d.minimumPayment), 0);
  }
  function totalUnpaidCredit(s) {
    const m = s.currentMonth;
    return (s.transactions || [])
      .filter(t => t.paymentType === "credit" && t.month === m)
      .reduce((a, t) => a + num(t.amount), 0);
  }
  function safeToSpend(s) {
    return totalIncome(s) - tithe(s) - totalBills(s) - totalDebtMins(s) - totalUnpaidCredit(s);
  }
  function spendingBudgetedTotal(s) {
    return (s.spendingCategories || []).reduce((a, c) => a + num(c.budgeted), 0);
  }
  function totalBudgeted(s) {
    return billsSubtotal(s) + tithe(s) + totalDebtMins(s) + spendingBudgetedTotal(s);
  }
  function extraForDebt(s) {
    return totalIncome(s) - tithe(s) - totalBills(s) - totalDebtMins(s) - spendingBudgetedTotal(s);
  }
  function categorySpent(s, id) {
    const m = s.currentMonth;
    return (s.transactions || [])
      .filter(t => t.categoryId === id && t.month === m)
      .reduce((a, t) => a + num(t.amount), 0);
  }
  function rolloverAmount(s, id) {
    return num(s.monthlyRollover && s.monthlyRollover[s.currentMonth] && s.monthlyRollover[s.currentMonth][id]);
  }
  function categoryRemaining(s, cat) {
    return num(cat.budgeted) + rolloverAmount(s, cat.id) - categorySpent(s, cat.id);
  }
  function personSpent(s, person) {
    const m = s.currentMonth;
    return (s.transactions || [])
      .filter(t => t.month === m && t.person === person)
      .reduce((a, t) => a + num(t.amount), 0);
  }
  function totalDebt(s) {
    return (s.debts || []).reduce((a, d) => a + num(d.balance), 0);
  }
  function targetDebt(s) {
    const active = (s.debts || []).filter(d => num(d.balance) > 0).sort((a,b) => num(a.balance)-num(b.balance));
    return active[0] || null;
  }
  // Actually paid on credit that has been "covered" (spent from cash budget). We use a simple model:
  // cash to cover = safeToSpend + totalUnpaidCredit (i.e. what would remain if credit was paid off).
  function unpaidCredit(s) { return totalUnpaidCredit(s); }
  function cashToCover(s) {
    // The safeToSpend formula already deducts unpaid credit. Total cash available to pay off credit
    // this month = safeToSpend + unpaidCredit. If <0, we can't cover the credit.
    return safeToSpend(s) + totalUnpaidCredit(s);
  }

  return {
    num,
    totalIncome, tithePercent, tithe, billsSubtotal, totalBills, totalDebtMins,
    totalUnpaidCredit, safeToSpend, spendingBudgetedTotal, totalBudgeted, extraForDebt,
    categorySpent, rolloverAmount, categoryRemaining, personSpent,
    totalDebt, targetDebt, unpaidCredit, cashToCover
  };
})();

/* ============================================================
   DEBT ENGINE — pure snowball simulation
   ============================================================ */
const DebtEngine = (() => {
  const monthNames = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

  function simulate(debtsInput, extraPerMonth, startMonth) {
    const empty = { payoffByDebt: {}, debtFreeDate: null, months: 0, order: [] };
    if (!debtsInput || !debtsInput.length) return empty;

    const sim = debtsInput.map(d => ({
      id: d.id,
      label: d.label,
      balance: Number(d.balance) || 0,
      min: Number(d.minimumPayment) || 0,
      rate: Number(d.interestRate) || 0
    })).filter(d => d.balance > 0)
      .sort((a, b) => a.balance - b.balance);

    if (!sim.length) return empty;

    const order = sim.map(d => d.id);
    const payoff = {};
    let [year, month] = (startMonth || Util.currentMonthYM()).split("-").map(Number);
    let cascadedMin = 0;
    let iter = 0;
    const MAX = 720; // 60 years cap safety

    while (sim.some(d => d.balance > 0) && iter < MAX) {
      // 1. Minimum payments to all still-active debts
      for (const d of sim) {
        if (d.balance <= 0) continue;
        d.balance -= d.min;
        if (d.balance < 0) d.balance = 0;
      }
      // 2. Apply interest to all still-active debts
      for (const d of sim) {
        if (d.balance <= 0) continue;
        d.balance += d.balance * (d.rate / 12 / 100);
      }
      // 3. Send extra + cascaded to smallest still-active, cascade overflow
      let extra = (Number(extraPerMonth) || 0) + cascadedMin;
      for (const d of sim) {
        if (d.balance <= 0) continue;
        if (extra <= 0) break;
        const applied = Math.min(extra, d.balance);
        d.balance -= applied;
        extra -= applied;
      }
      // 4. Record any new payoffs, cascade their minimums into future extras
      for (const d of sim) {
        if (d.balance <= 0 && !payoff[d.id]) {
          payoff[d.id] = `${monthNames[month - 1]} ${year}`;
          cascadedMin += d.min;
        }
      }
      iter++;
      if (sim.every(d => d.balance <= 0)) break;
      // Advance month
      month++;
      if (month > 12) { month = 1; year++; }
    }

    // Debt-free date is the latest payoff month
    let latest = null;
    let latestKey = -1;
    for (const id in payoff) {
      const [mo, yr] = payoff[id].split(" ");
      const k = Number(yr) * 12 + monthNames.indexOf(mo);
      if (k > latestKey) { latestKey = k; latest = payoff[id]; }
    }
    return { payoffByDebt: payoff, debtFreeDate: latest, months: iter, order };
  }

  return { simulate };
})();

      categoryType: logForm.categoryType,
      note: (logForm.note || "").toUpperCase().slice(0, 60),
      paymentType: logForm.paymentType,
      person: person,
      month: s.currentMonth
    };
    const patch = { transactions: [...(s.transactions||[]), txn] };

    // If logging against a debt, decrement its balance
    if (logForm.categoryType === "debt") {
      const debts = (s.debts||[]).map(d => {
        if (d.id !== logForm.categoryId) return d;
        const newBal = Math.max(0, (Number(d.balance)||0) - amount);
        return { ...d, balance: Math.round(newBal * 100) / 100 };
      });
      patch.debts = debts;
    }

    try {
      await DataService.update(patch);
      // Reset form
      logForm.amount = "";
      logForm.note = "";
      // keep last-used category and payment for convenience
      render();
    } catch (err) {
      console.warn(err);
      alert("COULDN'T SAVE; CHECK CONNECTION");
    }
  }

  /* ------------- DASHBOARD ------------- */
  function renderDashboard(s) {
    const safe = BudgetEngine.safeToSpend(s);

    const budgeted = BudgetEngine.totalBudgeted(s);
    const isCouple = s.settings && s.settings.mode === "couple";

    // Debt block
    const totalDebt = BudgetEngine.totalDebt(s);
    const mins = BudgetEngine.totalDebtMins(s);
    const target = BudgetEngine.targetDebt(s);

    // Category rows
    const cats = (s.spendingCategories||[]);
    const catRows = cats.map(c => {
      const spent = BudgetEngine.categorySpent(s, c.id);
      const roll = BudgetEngine.rolloverAmount(s, c.id);
      const budget = BudgetEngine.num(c.budgeted) + roll;
      const remaining = budget - spent;
      const pct = budget > 0 ? Math.min(100, (spent / budget) * 100) : 0;
      const barClass = pct >= 90 ? "danger" : (pct >= 75 ? "warn" : "");
      const remainClass = remaining < 0 ? "text-danger" : "";
      return `
        <div class="cat-row">
          <div class="cat-line">
            <span>${Util.esc(c.label)}</span>
            <span>${Util.esc(Util.fmtMoney(spent,0))} / ${Util.esc(Util.fmtMoney(budget,0))}</span>

    // Credit block
    const unpaid = BudgetEngine.totalUnpaidCredit(s);

    root.innerHTML = `

        ${gear()}
        <section class="section lime">
          <div class="sub-label">SAFE TO SPEND</div>
          <div class="hero ${heroDanger}">${Util.esc(Util.fmtMoney(safe,0))}</div>
          <div class="sub-label" style="margin-top:8px;">INCOME: ${Util.esc(Util.fmtMoney(income,0))} · BUDGETED: ${Util.esc(Util.fmtMoney(budgeted,0))}</div>
          ${peopleHtml}
        </section>

        <section class="section terracotta">
          <div class="section-label">→ TOTAL DEBT</div>
          <div class="hero" style="margin-top:8px;">${Util.esc(Util.fmtMoney(totalDebt,0))}</div>
          <div class="sub-label" style="margin-top:8px;">MINIMUMS: ${Util.esc(Util.fmtMoney(mins,0))}/MO</div>
          <div class="sub-label" style="margin-top:4px;">${target ? `TARGETING: ${Util.esc(target.label)} · ${Util.esc(Util.fmtMoney(Number(target.balance)||0,0))} REMAINING` : "NO ACTIVE DEBTS"}</div>
        </section>

        <section class="section teal">
          <div class="section-label">→ CATEGORIES</div>
          <div style="margin-top:24px;">${catRows}</div>
        </section>

        <section class="section lavender">
          <div class="section-label">→ CREDIT THIS MONTH</div>
          <div class="sub-label" style="margin-top:12px;">UNPAID: ${Util.esc(Util.fmtMoney(unpaid,0))}</div>
          <div class="sub-label" style="margin-top:4px;">CASH TO COVER: ${Util.esc(Util.fmtMoney(Math.max(0,cashCover),0))}</div>
          <div class="sub-label ${covered ? '' : 'text-danger'}" style="margin-top:12px;">

  // Convert "AUG 2025" -> "2025-08" (for fmtMonthLong)
  function monthYMFromShort(shortStr) {
    if (!shortStr || shortStr === "NOT YET") return null;
    const parts = shortStr.split(" ");
    if (parts.length !== 2) return null;
    const names = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
    const idx = names.indexOf(parts[0]);
    if (idx < 0) return null;
    return `${parts[1]}-${String(idx+1).padStart(2,"0")}`;
  }

  function bindDebtsEvents(s) {
    root.querySelectorAll("[data-action=extra-preview]").forEach(el => {
      el.addEventListener("click", () => {
        const v = parseInt(el.dataset.amt, 10);
        extraPreview = (extraPreview === v ? 0 : v);
        render();
      });
    });
    const addBtn = root.querySelector("[data-action=show-add-debt]");
    if (addBtn) addBtn.addEventListener("click", () => {
      addForms.debt = { label: "", balance: "", minimumPayment: "", interestRate: "" };
      render();
    });
    root.querySelectorAll("[data-action=add-form-input]").forEach(el => {
      el.addEventListener("input", e => {
        const kind = el.dataset.kind;
        const field = el.dataset.field;
        if (addForms[kind]) addForms[kind][field] = e.target.value;
      });
    });
    const saveDebt = root.querySelector("[data-action=save-add-debt]");
    if (saveDebt) saveDebt.addEventListener("click", () => saveNewDebt(s));
    const cancelDebt = root.querySelector("[data-action=cancel-add-debt]");
    if (cancelDebt) cancelDebt.addEventListener("click", () => { addForms.debt = null; render(); });

    root.querySelectorAll("[data-action=edit-item]").forEach(el => {
      el.addEventListener("click", () => {
        const kind = el.dataset.kind;
        const id = el.dataset.id;
        editStates[kind + "_" + id] = !editStates[kind + "_" + id];
        render();
      });
    });
    bindEditFormEvents(s);
  }

  async function saveNewDebt(s) {
    formErrors.add_debt = "";
    const f = addForms.debt || {};
    const label = (f.label||"").trim();
    if (!label) { formErrors.add_debt = "LABEL REQUIRED"; render(); return; }
    const balance = parseFloat(f.balance) || 0;
    const min = parseFloat(f.minimumPayment) || 0;
    const rate = parseFloat(f.interestRate) || 0;
    const newDebt = {
      id: Util.uuid(),
      label: label.toUpperCase(),
      balance: balance,
      originalBalance: balance,
      minimumPayment: min,
      interestRate: rate
    };
    try {
      await DataService.update({ debts: [...(s.debts||[]), newDebt] });
      addForms.debt = null;
      render();
    } catch (err) { alert("COULDN'T SAVE"); console.warn(err); }
  }

        setupState.step = "who"; setupState.mode = null; setupState.names = ["",""];
        setupState.generatedCode = ""; setupState.joinCode = ""; setupState.error = "";
        renderSetup();
      });
    });
    root.querySelectorAll("[data-action=copy-code]").forEach(el => {
      el.addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(el.dataset.code); const t=el.textContent; el.textContent="COPIED"; setTimeout(()=>{el.textContent=t;},1000); } catch (e) {}
      });
    });
    root.querySelectorAll("[data-action=edit-tithe]").forEach(el => {
      el.addEventListener("click", () => {
        titheEdit.open = true;
        titheEdit.value = String(BudgetEngine.tithePercent(s));
        formErrors.tithe = "";
        render();
      });
    });
    const titheInput = root.querySelector("#tithe-input");
    if (titheInput) titheInput.addEventListener("input", e => { titheEdit.value = e.target.value; });
    root.querySelectorAll("[data-action=cancel-tithe]").forEach(el => {
      el.addEventListener("click", () => { titheEdit.open = false; formErrors.tithe = ""; render(); });
    });
    root.querySelectorAll("[data-action=save-tithe]").forEach(el => {
      el.addEventListener("click", async () => {
        formErrors.tithe = "";
        const n = parseFloat(titheEdit.value);
        if (!isFinite(n) || n < 0 || n > 100) {
          formErrors.tithe = "ENTER A NUMBER 0-100";
          render();
          return;
        }
        try {
          await DataService.update({ "settings.tithePercent": n });
          titheEdit.open = false;
          render();
        } catch (e) { alert("COULDN'T SAVE"); console.warn(e); }
      });
    });
    root.querySelectorAll("[data-action=show-add]").forEach(el => {
      el.addEventListener("click", () => {
        const kind = el.dataset.kind;
        if (kind === "income") addForms.income = { label: "", amount: "", dueDateOfMonth: "1" };
        else if (kind === "bill") addForms.bill = { label: "", amount: "", dueDateOfMonth: "1" };
        else if (kind === "savings") addForms.savings = { label: "", amount: "", dueDateOfMonth: "1" };
        else if (kind === "spending") addForms.spending = { label: "", budgeted: "" };
        render();
      });
    });
    root.querySelectorAll("[data-action=show-add-debt]").forEach(el => {
      el.addEventListener("click", () => {
        addForms.debt = { label: "", balance: "", minimumPayment: "", interestRate: "" };
        render();
      });
    });
    root.querySelectorAll("[data-action=add-form-input]").forEach(el => {
      el.addEventListener("input", e => {
        const kind = el.dataset.kind;
        const field = el.dataset.field;
        if (addForms[kind]) addForms[kind][field] = e.target.value;
      });
    });
    root.querySelectorAll("[data-action=cancel-add]").forEach(el => {
      el.addEventListener("click", () => {
        const k = el.dataset.kind;
        addForms[k] = null;
        formErrors["add_" + k] = "";
        render();
      });
    });
    root.querySelectorAll("[data-action=cancel-add-debt]").forEach(el => {
      el.addEventListener("click", () => {
        addForms.debt = null;
        formErrors.add_debt = "";
        render();
      });
    });
    root.querySelectorAll("[data-action=save-add]").forEach(el => {
      el.addEventListener("click", () => saveNewItem(el.dataset.kind, s));
    });
    root.querySelectorAll("[data-action=save-add-debt]").forEach(el => {
      el.addEventListener("click", () => saveNewDebt(s));
    });
    root.querySelectorAll("[data-action=delete-item]").forEach(el => {
      el.addEventListener("click", () => deleteItem(el.dataset.kind, el.dataset.id, s));
    });
    root.querySelectorAll("[data-action=edit-item]").forEach(el => {
      el.addEventListener("click", () => {
        const key = el.dataset.kind + "_" + el.dataset.id;
        editStates[key] = !editStates[key];
        render();
      });
    });
    bindEditFormEvents(s);
    root.querySelectorAll("[data-action=open-new-month]").forEach(el => {
      el.addEventListener("click", () => {
        newMonthOpen = true;
        newMonthChoices = {};
        render();
      });
    });
  }

  function bindEditFormEvents(s) {
    root.querySelectorAll("[data-action=cancel-edit]").forEach(el => {
      el.addEventListener("click", () => {
        editStates[el.dataset.kind + "_" + el.dataset.id] = false;
        render();
      });
    });
    root.querySelectorAll("[data-action=save-edit]").forEach(el => {
      el.addEventListener("click", () => saveEdit(el.dataset.kind, el.dataset.id, s));
    });
  }

  async function saveEdit(kind, id, s) {
    const form = root.querySelector(`[data-edit-form][data-kind="${kind}"][data-id="${id}"]`);
    if (!form) return;
    const values = {};
    form.querySelectorAll("[data-edit-field]").forEach(inp => { values[inp.dataset.editField] = inp.value; });
    const patch = {};
    if (kind === "income") {
      const arr = (s.income||[]).map(i => i.id === id ? {
        ...i,
        label: (values.label||i.label).toUpperCase(),
        amount: parseFloat(values.amount) || 0,
        dueDateOfMonth: parseInt(values.dueDateOfMonth,10) || 1
      } : i);
      patch.income = arr;
    } else if (kind === "bill" || kind === "savings") {
      const arr = (s.bills||[]).map(b => b.id === id ? {
        ...b,
        label: (values.label||b.label).toUpperCase(),
        amount: parseFloat(values.amount) || 0,
        dueDateOfMonth: parseInt(values.dueDateOfMonth,10) || 1
      } : b);
      patch.bills = arr;
    } else if (kind === "spending") {
      const arr = (s.spendingCategories||[]).map(c => c.id === id ? {
        ...c,
        label: (values.label||c.label).toUpperCase(),
        budgeted: parseFloat(values.budgeted) || 0
      } : c);
      patch.spendingCategories = arr;
    } else if (kind === "debt") {
      const arr = (s.debts||[]).map(d => {
        if (d.id !== id) return d;
        const newBal = parseFloat(values.balance);
        return {
          ...d,
          label: (values.label||d.label).toUpperCase(),
          balance: isFinite(newBal) ? newBal : d.balance,
          originalBalance: Number(d.originalBalance) || (isFinite(newBal) ? newBal : d.balance),
          minimumPayment: parseFloat(values.minimumPayment) || 0,
          interestRate: parseFloat(values.interestRate) || 0
        };
      });
      patch.debts = arr;
    }
    try {
      await DataService.update(patch);
      editStates[kind + "_" + id] = false;
      render();
    } catch (e) { alert("COULDN'T SAVE"); console.warn(e); }
  }

  async function saveNewItem(kind, s) {
    formErrors["add_" + kind] = "";
    const f = addForms[kind] || {};
    const label = (f.label||"").trim();
    if (!label) { formErrors["add_" + kind] = "LABEL REQUIRED"; render(); return; }
    const patch = {};
    if (kind === "income") {
      const item = { id: Util.uuid(), label: label.toUpperCase(), amount: parseFloat(f.amount)||0, dueDateOfMonth: parseInt(f.dueDateOfMonth,10)||1 };
      patch.income = [...(s.income||[]), item];
    } else if (kind === "bill" || kind === "savings") {
      const item = { id: Util.uuid(), label: label.toUpperCase(), amount: parseFloat(f.amount)||0, dueDateOfMonth: parseInt(f.dueDateOfMonth,10)||1, category: kind };
      patch.bills = [...(s.bills||[]), item];
    } else if (kind === "spending") {
      const item = { id: Util.uuid(), label: label.toUpperCase(), budgeted: parseFloat(f.budgeted)||0, type: "spending" };
      patch.spendingCategories = [...(s.spendingCategories||[]), item];
    }
    try {
      await DataService.update(patch);
      addForms[kind] = null;
      render();
    } catch (e) { alert("COULDN'T SAVE"); console.warn(e); }
  }

  async function deleteItem(kind, id, s) {
    if (!confirm("DELETE THIS ITEM?")) return;
    const patch = {};
    if (kind === "income") patch.income = (s.income||[]).filter(x => x.id !== id);
    else if (kind === "bill" || kind === "savings") patch.bills = (s.bills||[]).filter(x => x.id !== id);
    else if (kind === "spending") patch.spendingCategories = (s.spendingCategories||[]).filter(x => x.id !== id);
    else if (kind === "debt") patch.debts = (s.debts||[]).filter(x => x.id !== id);
    try { await DataService.update(patch); render(); } catch (e) { alert("COULDN'T DELETE"); }
  }

  /* ------------- NEW MONTH OVERLAY (only allowed modal) ------------- */
  function renderNewMonthOverlay(s) {
    const cats = (s.spendingCategories||[]);
    const rows = cats.map(c => {
      const remaining = BudgetEngine.categoryRemaining(s, c);
      const choice = newMonthChoices[c.id] || "roll";
      return `
        <div class="rollover-row">
          <h4>${Util.esc(c.label)}</h4>
          <div class="amt">${Util.esc(Util.fmtMoney(remaining,0))} UNSPENT</div>
          <div class="choice-row">
            <button class="${choice==='roll'?'active':''}" data-action="nm-choice" data-id="${Util.esc(c.id)}" data-choice="roll">ROLL OVER →</button>
            <button class="${choice==='reset'?'active':''}" data-action="nm-choice" data-id="${Util.esc(c.id)}" data-choice="reset">RESET TO $0</button>
          </div>
        </div>`;
    }).join("");

    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerHTML = `
      <div class="overlay-inner">
        <button class="link" data-action="nm-cancel">× CLOSE</button>
        <h2 class="section-label" style="margin-top:16px;">→ NEW MONTH</h2>
        <div class="meta" style="margin-top:8px;">CURRENT: ${Util.esc(Util.fmtMonthLong(s.currentMonth))} · NEXT: ${Util.esc(Util.fmtMonthLong(nextMonth(s.currentMonth)))}</div>
        <div style="margin-top:24px;">${rows || `<div class="meta">NO SPENDING CATEGORIES</div>`}</div>
        <button class="cta big" style="margin-top:24px;" data-action="nm-confirm">→ CONFIRM NEW MONTH</button>
      </div>`;
    document.body.appendChild(overlay);

    overlay.querySelectorAll("[data-action=nm-choice]").forEach(el => {
      el.addEventListener("click", () => {
        newMonthChoices[el.dataset.id] = el.dataset.choice;
        // Re-render overlay only (remove existing and re-add)
        overlay.remove();
        renderNewMonthOverlay(s);
      });
    });
    overlay.querySelector("[data-action=nm-cancel]").addEventListener("click", () => {
      newMonthOpen = false; overlay.remove(); render();
    });
    overlay.querySelector("[data-action=nm-confirm]").addEventListener("click", () => confirmNewMonth(s, overlay));
  }

  function nextMonth(ym) {
    let [y, m] = ym.split("-").map(Number);
    m++;
    if (m > 12) { m = 1; y++; }
    return `${y}-${String(m).padStart(2,"0")}`;
  }

  async function confirmNewMonth(s, overlay) {
    const newMonth = nextMonth(s.currentMonth);
    const rollovers = {};
    (s.spendingCategories||[]).forEach(c => {
      const choice = newMonthChoices[c.id] || "roll";
      if (choice === "roll") {
        const remaining = BudgetEngine.categoryRemaining(s, c);
        if (remaining > 0) rollovers[c.id] = Math.round(remaining * 100) / 100;
      }
    });
    const patch = {};
    const mr = Object.assign({}, s.monthlyRollover || {});
    mr[newMonth] = rollovers;
    patch.monthlyRollover = mr;
    patch.currentMonth = newMonth;
    try {
      await DataService.update(patch);
      newMonthOpen = false;
      newMonthChoices = {};
      overlay.remove();
      render();
    } catch (e) { alert("COULDN'T UPDATE"); console.warn(e); }
  }

  /* ------------- GLOBAL EVENTS ------------- */
  function bindGlobalTabs() {
    root.querySelectorAll(".tab").forEach(el => {
      el.addEventListener("click", () => { currentTab = el.dataset.tab; settingsOpen = false; render(); });
    });
    root.querySelectorAll("[data-action=open-settings]").forEach(el => {
      el.addEventListener("click", () => { settingsOpen = true; render(); });
    });
  }

  return { render, renderLoading };
})();

/* ============================================================
   BOOT
   ============================================================ */
(function boot() {
  DataService.onData(() => UI.render());
  DataService.onError(() => {
    // If we've never received data and we can't reach Firestore,
    // fall back gracefully — if there's no household ID, show setup.
    if (!DataService.get() && !DataService.getHouseholdId()) {
      UI.render();
    }
  });

  const existing = DataService.getHouseholdId();
  if (existing) {
    UI.renderLoading("SYNCING...");
    if (db) {
      DataService.subscribe(existing);
      // Safety: if we don't receive data within 6s, keep loading screen but still allow reset
    } else {
      UI.renderLoading("OFFLINE; CAN'T REACH SYNC");
    }
  } else {
    UI.render(); // renders setup
  }
})();
</script>
</body>
</html>
